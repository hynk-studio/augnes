name: Authority Boundary Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  authority-boundary-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run authority boundary smoke
        run: npm run smoke:authority-boundary-regression-v0-1

      - name: Run isolated vNext durable semantic loop smoke
        shell: bash
        run: |
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          AUGNES_DB_PATH="$TMP_DIR/vnext-durable-semantic-loop.db" npm run smoke:vnext-durable-semantic-loop-v0-1

      - name: Build without default database access
        run: npm run build
