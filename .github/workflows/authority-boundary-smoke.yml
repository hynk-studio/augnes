name: Authority Boundary Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  authority-boundary-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run authority boundary smoke
        run: npm run smoke:authority-boundary-regression-v0-1
