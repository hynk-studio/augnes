name: Canonical CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: canonical-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup canonical dependencies
        uses: ./.github/actions/setup-canonical

      - name: Typecheck
        run: npm run typecheck

      - name: Build with an isolated database
        run: npm run build

      - name: Unit and protocol tests
        run: npm test

      - name: Authority tests
        run: npm run test:authority

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup canonical dependencies
        uses: ./.github/actions/setup-canonical

      - name: Runtime, migration, recovery, and export integration tests
        run: npm run test:integration

  operability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup canonical dependencies
        uses: ./.github/actions/setup-canonical

      - name: Runtime operability tests
        run: npm run test:operability

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup canonical dependencies
        uses: ./.github/actions/setup-canonical

      - name: Automated golden-path E2E
        run: npm run test:e2e

  canonical-tests:
    name: canonical-tests
    needs: [static-authority, integration, operability, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every canonical job to succeed
        env:
          STATIC_AUTHORITY_RESULT: ${{ needs.static-authority.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          OPERABILITY_RESULT: ${{ needs.operability.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -eu
          test "$STATIC_AUTHORITY_RESULT" = "success"
          test "$INTEGRATION_RESULT" = "success"
          test "$OPERABILITY_RESULT" = "success"
          test "$E2E_RESULT" = "success"
