name: Canonical CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: canonical-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canonical-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/augnes_apps/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install nested app dependencies
        run: npm --prefix apps/augnes_apps ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build with an isolated database
        run: npm run build

      - name: Unit and protocol tests
        run: npm test

      - name: Runtime, migration, recovery, and export integration tests
        run: npm run test:integration

      - name: Authority tests
        run: npm run test:authority

      - name: Runtime operability tests
        timeout-minutes: 15
        run: npm run test:operability

      - name: Automated golden-path E2E
        timeout-minutes: 10
        run: npm run test:e2e
