name: M3D Evidence Runner Qualification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  portable-qualification:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/augnes_apps/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install nested app dependencies
        run: npm --prefix apps/augnes_apps ci

      - name: Run qualification regression smoke
        run: npm run smoke:vnext-m3d-evidence-runner-qualification-v0-1

      - name: Run autonomous runner orchestration smoke
        run: npm run smoke:vnext-m3d-autonomous-evidence-runner-v0-1

      - name: Validate autonomous runner dry-run
        shell: bash
        run: |
          DRY_PARENT="$(mktemp -d)"
          trap 'rm -rf "$DRY_PARENT"' EXIT
          npm run vnext:m3d-autonomous-evidence-runner-v0-1 -- \
            --dry-run \
            --canonical-checkout-root "$GITHUB_WORKSPACE" \
            --run-root "$DRY_PARENT/run" \
            --json

      - name: Run portable qualification
        shell: bash
        run: |
          QUAL_ROOT="$(mktemp -d)"
          trap 'rm -rf "$QUAL_ROOT"' EXIT
          CANONICAL_QUAL_ROOT="$(cd "$QUAL_ROOT" && pwd -P)"
          mkdir "$CANONICAL_QUAL_ROOT/canonical-checkout-fixture"
          npm run qualify:vnext-m3d-evidence-runner-v0-1 -- \
            --mode portable \
            --repo-root "$GITHUB_WORKSPACE" \
            --runtime-root "$CANONICAL_QUAL_ROOT/runtime" \
            --evidence-root "$CANONICAL_QUAL_ROOT/evidence" \
            --working-db-path "$CANONICAL_QUAL_ROOT/runtime/rehearsal.db" \
            --canonical-checkout-root "$CANONICAL_QUAL_ROOT/canonical-checkout-fixture" \
            --output "$CANONICAL_QUAL_ROOT/evidence/qualification.json" \
            --json
