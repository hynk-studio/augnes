name: Setup canonical dependencies
description: Install clean Node dependencies for one isolated Canonical CI job.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: |
          package-lock.json
          apps/augnes_apps/package-lock.json

    - name: Install root dependencies
      shell: bash
      run: npm ci

    - name: Install nested app dependencies
      shell: bash
      run: npm --prefix apps/augnes_apps ci
