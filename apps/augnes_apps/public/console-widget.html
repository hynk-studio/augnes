<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Augnes Console</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        --bg: color-mix(in srgb, canvas 90%, #dbe4ea 10%);
        --card: color-mix(in srgb, canvas 92%, #f1f5f7 8%);
        --border: color-mix(in srgb, canvastext 14%, transparent);
        --muted: color-mix(in srgb, canvastext 62%, transparent);
        --accent: #0f5f7a;
        --accent-soft: rgba(15, 95, 122, 0.12);
        --good: #1d6b3f;
        --warn: #9c6700;
        --bad: #a03232;
        --shadow: 0 12px 28px rgba(18, 34, 44, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(15, 95, 122, 0.14), transparent 32%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 32%),
          var(--bg);
        color: canvastext;
      }

      .shell {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .panel,
      .hero {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 16px;
        display: grid;
        gap: 10px;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .hero h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.2;
      }

      .hero p,
      .muted {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .chip-row,
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 12px;
        line-height: 1.2;
        background: rgba(255, 255, 255, 0.45);
      }

      .tag {
        border-radius: 12px;
      }

      .tag.fetchable {
        border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
        background: color-mix(in srgb, var(--accent-soft) 70%, transparent);
      }

      .tone-pass {
        color: var(--good);
        border-color: color-mix(in srgb, var(--good) 40%, var(--border));
      }

      .tone-warn {
        color: var(--warn);
        border-color: color-mix(in srgb, var(--warn) 40%, var(--border));
      }

      .tone-fail {
        color: var(--bad);
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
      }

      .panel {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
      }

      .summary {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
        background: color-mix(in srgb, var(--accent-soft) 55%, canvas 45%);
        font-size: 14px;
        line-height: 1.55;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.4);
      }

      .metric dt {
        margin: 0 0 6px 0;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .metric dd {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        word-break: break-word;
      }

      details {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      .section-body {
        padding: 0 14px 14px 14px;
        display: grid;
        gap: 10px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        display: grid;
        gap: 6px;
        background: rgba(255, 255, 255, 0.36);
      }

      .item-title {
        font-weight: 600;
        line-height: 1.35;
      }

      .item-note,
      .meta-line {
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }

      .code-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .code {
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
        padding: 5px 8px;
        border-radius: 10px;
        background: rgba(19, 37, 49, 0.08);
        border: 1px solid var(--border);
        word-break: break-all;
      }

      .recommended {
        padding: 14px;
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(15, 95, 122, 0.92), rgba(18, 54, 69, 0.92)),
          var(--accent);
        color: white;
      }

      .recommended small {
        display: block;
        opacity: 0.78;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .recommended strong {
        display: block;
        font-size: 20px;
      }

      .status-box {
        padding: 12px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .copy-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .copy-button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--accent) 52%, var(--border));
        border-radius: 12px;
        background: color-mix(in srgb, var(--accent) 88%, canvastext 12%);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 36px;
        padding: 7px 12px;
      }

      .copy-button:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, canvastext);
        outline-offset: 2px;
      }

      .error-box {
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
        color: var(--bad);
        background: rgba(160, 50, 50, 0.08);
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(19, 37, 49, 0.08);
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 10px;
        }

        .hero,
        .panel {
          border-radius: 14px;
          padding: 12px;
        }

        .hero-top,
        .panel-head {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1>Augnes: Evidence &amp; Continuity Console</h1>
            <p>Read-first surface only. Augnes Core remains the authority holder.</p>
          </div>
          <div class="stat-row">
            <span class="chip">v1 read-only</span>
            <span id="profile-chip" class="chip">profile: public</span>
          </div>
        </div>
        <div class="chip-row">
          <span class="chip">evidence-backed</span>
          <span class="chip">boundary-aware</span>
          <span class="chip">continuity-visible</span>
          <span class="chip">no canonical writes</span>
        </div>
        <div id="status" class="status-box">Waiting for tool output…</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="panel-title">Console Panel</h2>
          <div class="stat-row">
            <span id="panel-chip" class="chip">idle</span>
            <span id="updated-chip" class="chip">not updated</span>
          </div>
        </div>
        <div id="panel"></div>
      </section>
    </div>

    <script type="module">
      const statusEl = document.getElementById("status");
      const panelEl = document.getElementById("panel");
      const panelTitleEl = document.getElementById("panel-title");
      const panelChipEl = document.getElementById("panel-chip");
      const updatedChipEl = document.getElementById("updated-chip");
      const profileChipEl = document.getElementById("profile-chip");

      let requestId = 0;
      const pending = new Map();
      const uiState = {
        lastPanel: "idle",
        lastUpdated: null,
        profile: "public",
      };

      function rpcRequest(method, params) {
        return new Promise((resolve, reject) => {
          const id = `req-${++requestId}`;
          pending.set(id, { resolve, reject });
          window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        });
      }

      function rpcNotify(method, params) {
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      }

      function el(tag, options = {}) {
        const node = document.createElement(tag);
        if (options.className) node.className = options.className;
        if (options.text) node.textContent = options.text;
        if (options.html) node.innerHTML = options.html;
        return node;
      }

      function codeChip(text) {
        return el("span", { className: "code", text });
      }

      function badge(text, tone) {
        const className = tone ? `chip tone-${tone}` : "chip";
        return el("span", { className, text });
      }

      function tag(text, options = {}) {
        const className = `tag${options.fetchable ? " fetchable" : ""}${options.tone ? ` tone-${options.tone}` : ""}`;
        return el("span", { className, text });
      }

      function createMetricGrid(entries) {
        const grid = el("dl", { className: "metric-grid" });
        entries.forEach(([label, value]) => {
          const card = el("div", { className: "metric" });
          const dt = el("dt", { text: label });
          const dd = el("dd", { text: value });
          card.append(dt, dd);
          grid.appendChild(card);
        });
        return grid;
      }

      function createSection(title, contentNode, options = {}) {
        const details = document.createElement("details");
        details.open = options.open !== false;
        const summary = document.createElement("summary");
        summary.append(el("span", { text: title }));
        if (options.badge) {
          summary.appendChild(tag(options.badge));
        }
        const body = el("div", { className: "section-body" });
        body.appendChild(contentNode);
        details.append(summary, body);
        return details;
      }

      function resolveProfile(data) {
        return data?.profile === "chrono_lab" ? "chrono_lab" : "public";
      }

      function isLabProfile(profile) {
        return profile === "chrono_lab";
      }

      function createList(items, renderItem) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("div", { className: "stack" });
        items.forEach((item) => list.appendChild(renderItem(item)));
        return list;
      }

      function createTextList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("ul", { className: "list" });
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
        return list;
      }

      function createCodeList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const wrap = el("div", { className: "code-list" });
        items.forEach((item) => wrap.appendChild(codeChip(item)));
        return wrap;
      }

      function createEvidenceCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title || item.id }));
        if (item.stance) {
          const tone = item.stance === "supporting" ? "pass" : item.stance === "contradicting" ? "fail" : "";
          titleRow.appendChild(tag(item.stance, { tone }));
        }
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        if (item.note) {
          card.appendChild(el("div", { className: "item-note", text: item.note }));
        }
        if (item.url) {
          card.appendChild(el("div", { className: "item-note", text: item.url }));
        }
        return card;
      }

      function createRepoNodeCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.kind));
        titleRow.appendChild(tag(item.fetchable ? "fetchable" : "view-only", { fetchable: item.fetchable }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `Node: ${item.nodeId}` }));
        return card;
      }

      function createGateCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.gate }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createTransitionCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.scenario }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createCarryForwardCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.stage));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.why }));
        return card;
      }

      function createTraceCapsuleCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: item.title }));
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.reuseValue }));
        return card;
      }

      function renderJson(value) {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(value, null, 2);
        return pre;
      }

      function createPreBlock(text) {
        const pre = document.createElement("pre");
        pre.textContent = text;
        return pre;
      }

      function renderCopyableHandoffPacket(preview) {
        const root = el("div", { className: "stack" });
        const packetText = preview.copyable_handoff_text;
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The packet is for a separate Codex session; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, merge, or enable auto-merge.",
        });
        status.setAttribute("aria-live", "polite");
        const preflightHint = el("div", {
          className: "status-box",
          text:
            "After copying, validate locally with codex:handoff-preflight. Copy this packet into a file or stdin before using it in a separate Codex session. Default mode checks copied packets; strict mode requires concrete current-runtime confirmation.",
        });
        const copyRow = el("div", { className: "copy-row" });
        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.textContent = "Copy Codex Handoff";
        copyButton.addEventListener("click", async () => {
          try {
            if (!navigator.clipboard?.writeText) {
              throw new Error("Clipboard unavailable.");
            }
            await navigator.clipboard.writeText(packetText);
            status.textContent = "Handoff copied.";
          } catch {
            status.textContent = "Copy unavailable. Select and copy the packet text manually.";
          }
        });
        copyRow.appendChild(copyButton);
        root.append(status, preflightHint, copyRow, createPreBlock(packetText));
        return root;
      }

      function nonEmptyText(value, fallback) {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      function safeArray(value) {
        if (!Array.isArray(value)) return [];
        return value.filter((item) => typeof item === "string" && item.trim()).map((item) => item.trim());
      }

      function safeCount(value) {
        return Number.isFinite(value) ? String(value) : "0";
      }

      function createCodeListWithFallback(items, fallback) {
        const list = safeArray(items);
        if (!list.length) {
          return el("div", { className: "status-box", text: fallback });
        }
        return createCodeList(list);
      }

      function normalizeWorkContractCard(data) {
        const card = data?.work_contract_card || {};
        const brief = data?.brief || {};
        const work = brief.work || {};
        const codexHandoff = brief.codex_handoff || {};
        const relatedProof = brief.related_proof || {};
        const expectedFiles = safeArray(card.expected_files).length
          ? safeArray(card.expected_files)
          : safeArray(codexHandoff.expected_files);
        const expectedChecks = safeArray(card.expected_checks).length
          ? safeArray(card.expected_checks)
          : safeArray(codexHandoff.expected_checks || codexHandoff.suggested_verification || codexHandoff.verification_commands);
        const relatedStateKeys = safeArray(card.related_state_keys).length
          ? safeArray(card.related_state_keys)
          : safeArray(brief.related_state_keys || work.related_state_keys);
        const boundaries = safeArray(card.authority_boundary_text).length
          ? safeArray(card.authority_boundary_text)
          : [
              "Work ID is a trace anchor, not committed state authority.",
              "This card is read-only.",
              "This card cannot execute Codex.",
              "This card cannot commit or reject Augnes state.",
              "This card cannot approve, publish, retry, replay, externally post, merge, or enable auto-merge.",
              "Proof is not approval.",
              "A PR is not merge authority.",
              "Durable approval remains user/Core gated.",
            ];

        return {
          scope: nonEmptyText(card.scope || brief.scope, "No scope listed."),
          work_id: nonEmptyText(card.work_id || brief.work_id || work.work_id, "No work ID listed."),
          work_title: nonEmptyText(card.work_title || work.title, "No work title listed."),
          work_status: nonEmptyText(card.work_status || work.status, "No status listed."),
          priority: nonEmptyText(card.priority || work.priority, "No priority listed."),
          current_or_next_step: nonEmptyText(
            card.current_or_next_step || brief.next_action || work.next_action || codexHandoff.task_brief,
            "No current or next step is listed in the work brief."
          ),
          expected_files: expectedFiles,
          expected_files_summary: nonEmptyText(card.expected_files_summary, "No expected files are listed in the work brief."),
          expected_checks: expectedChecks,
          expected_checks_summary: nonEmptyText(card.expected_checks_summary, "No expected checks are listed in the work brief."),
          related_state_keys: relatedStateKeys,
          related_state_keys_summary: nonEmptyText(card.related_state_keys_summary, "No related state keys are listed in the work brief."),
          recent_events_count: card.recent_events_count ?? brief.recent_events?.length ?? 0,
          linked_proof_action_ids_count: card.linked_proof_action_ids_count ?? relatedProof.action_ids?.length ?? 0,
          linked_prs_count: card.linked_prs_count ?? relatedProof.prs?.length ?? 0,
          linked_docs_count: card.linked_docs_count ?? relatedProof.docs?.length ?? 0,
          linked_proof_summary: nonEmptyText(card.linked_proof_summary, "No linked proof/action IDs are listed in the work brief."),
          proof_evidence_expectation_summary: nonEmptyText(
            card.proof_evidence_expectation_summary,
            "No proof/evidence expectation is listed in the work brief; proof and evidence remain separate from approval."
          ),
          skipped_check_expectation_summary: nonEmptyText(
            card.skipped_check_expectation_summary,
            "Skipped checks must be reported with concrete reasons; no per-check skipped expectation is listed in the work brief."
          ),
          authority_boundary_text: boundaries,
        };
      }

      function normalizeCodexHandoffPreview(data, card) {
        const preview = data?.codex_handoff_preview || {};
        const boundaryText = safeArray(preview.boundary_text).length
          ? safeArray(preview.boundary_text)
          : [
              "This preview is read-only.",
              "This preview cannot execute Codex.",
              "This preview cannot record evidence.",
              "This preview cannot record proof.",
              "This preview cannot commit or reject Augnes state.",
              "This preview cannot approve, publish, retry, replay, or externally post.",
              "This preview cannot merge or enable auto-merge.",
              "Evidence is not approval.",
              "Proof is not approval.",
              "A PR is not merge authority.",
              "Durable approval remains user/Core gated.",
              "Raw DB paths are local-dev fallback only and should not be normal user-facing input.",
            ];
        const forbiddenActions = safeArray(preview.forbidden_actions).length
          ? safeArray(preview.forbidden_actions)
          : [
              "No Codex execution from this card.",
              "No commit/reject state.",
              "No approve/publish/retry/replay/external posting.",
              "No merge/auto-merge.",
              "No proof/evidence recording controls.",
            ];
        const stopConditions = safeArray(preview.stop_conditions).length
          ? safeArray(preview.stop_conditions)
          : [
              "codex:read-brief fails.",
              "Work ID is missing or unknown.",
              "Scope is missing or ambiguous.",
              "Expected scope or forbidden surfaces are ambiguous.",
              "Forbidden surfaces are required to complete the task.",
              "Evidence or proof recording is requested without explicit user/Core authorization.",
            ];
        const readinessReasons = safeArray(preview.readiness_reasons).length
          ? safeArray(preview.readiness_reasons)
          : ["Evidence/proof/browser choices need user/Core confirmation."];
        const fallbackRuntimeLabel = nonEmptyText(preview.runtime_endpoint_label, "provided by current Augnes runtime");
        const fallbackScope = nonEmptyText(preview.scope || card.scope, "No scope listed.");
        const fallbackWorkId = nonEmptyText(preview.work_id || card.work_id, "No work ID listed.");
        const fallbackWorkTitle = nonEmptyText(preview.work_title || card.work_title, "No work title listed.");
        const fallbackWorkStatus = nonEmptyText(preview.work_status || card.work_status, "No status listed.");
        const fallbackWorkNextAction = nonEmptyText(preview.work_next_action || card.current_or_next_step, "No current or next step is listed in the work brief.");
        const fallbackExpectedFiles = safeArray(preview.expected_files).length ? safeArray(preview.expected_files) : card.expected_files;
        const fallbackExpectedChecks = safeArray(preview.expected_checks).length ? safeArray(preview.expected_checks) : card.expected_checks;
        const fallbackRelatedStateKeys = safeArray(preview.related_state_keys).length ? safeArray(preview.related_state_keys) : card.related_state_keys;
        const fallbackEvidenceRecording = nonEmptyText(preview.evidence_recording, "needs_user_core_confirmation");
        const fallbackProofOnlyCloseout = nonEmptyText(preview.proof_only_closeout, "needs_user_core_confirmation");

          fallbackRuntimeLabel === "provided by current Augnes runtime" ? "<provided-current-runtime>" : fallbackRuntimeLabel;

          {
            schema: "augnes.codex_handoff_preview.v0_1",

            readiness_status: fallbackReadinessStatus,
            readiness_reasons: readinessReasons,

              next_action: fallbackWorkNextAction,

              proof_only_closeout: fallbackProofOnlyCloseout,

              files: fallbackExpectedFiles,

              preview_only: true,

              does_not_record_proof: true,
              does_not_mutate_state: true,
              does_not_merge: true,
            },
          },
          null,
          2
        );
        const packetText = nonEmptyText(
          preview.copyable_handoff_text,
          [
            "Codex Handoff Preview",
            "This is a preview/copy packet, not an execution action.",
            "",
            `AUGNES_API_BASE_URL=${fallbackRuntimeForCommand} CODEX_SCOPE=${fallbackScope} CODEX_WORK_ID=${fallbackWorkId} npm run codex:read-brief`,
            "",
            "Authority boundaries",
            ...boundaryText.map((item) => `- ${item}`),

            "Structured JSON",
            "BEGIN_AUGNES_CODEX_HANDOFF_JSON",
            fallbackJson,
            "END_AUGNES_CODEX_HANDOFF_JSON",
          ].join("\n")
        );

        return {
          readiness_status: fallbackReadinessStatus,
          readiness_reasons: readinessReasons,
          task_profile: fallbackTaskProfile,
          runtime_endpoint_label: fallbackRuntimeLabel,
          scope: fallbackScope,
          work_id: fallbackWorkId,
          work_title: fallbackWorkTitle,
          work_status: fallbackWorkStatus,
          work_next_action: fallbackWorkNextAction,

          forbidden_actions: forbiddenActions,
          stop_conditions: stopConditions,
          copyable_handoff_text: packetText,
          boundary_text: boundaryText,

      function safeObject(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function safeObjectArray(value) {
        return Array.isArray(value) ? value.filter((item) => item && typeof item === "object") : [];
      }

      function normalizeProjectConstellationPreview(data) {
        const preview = safeObject(data?.project_constellation_preview);
        const project = safeObject(preview.project_constellation || data?.project_constellation);
        const copySeed = safeObject(preview.copyable_handoff_seed || data?.copyable_handoff_seed);
        const fallbackText = nonEmptyText(preview.fallback_text, "");
        const evidencePointers = safeObjectArray(preview.evidence_pointers || data?.evidence_pointers || project.evidence_pointers);
        const unresolvedTensions = safeObjectArray(preview.unresolved_tensions || data?.unresolved_tensions || project.unresolved_tensions);
        const nextActionCandidates = safeObjectArray(preview.next_action_candidates || data?.next_action_candidates || project.next_action_candidates);
        const nodes = safeObjectArray(project.nodes);
        const edges = safeObjectArray(project.edges);
        const clusters = safeObjectArray(project.clusters);
        const missingDataFallbacks = safeArray(preview.missing_data_fallbacks || data?.missing_data_fallbacks);

        return {
          title: nonEmptyText(preview.title, "Project Constellation Preview"),
          scope: nonEmptyText(preview.scope, "project:augnes"),
          status: nonEmptyText(preview.status, fallbackText ? "unavailable" : "available"),
          fallback_text: fallbackText,
          project_constellation: {
            constellation_id: nonEmptyText(project.constellation_id, "No constellation ID returned."),
            boundary_class: nonEmptyText(project.boundary_class, "read_only_local_static_preview"),
            thesis: nonEmptyText(project.thesis, fallbackText || "No Project Constellation thesis was returned."),
            nodes,
            edges,
            clusters,
          },
          evidence_pointers: evidencePointers,
          unresolved_tensions: unresolvedTensions,
          next_action_candidates: nextActionCandidates,
          copyable_handoff_seed: {
            status: nonEmptyText(copySeed.status, fallbackText ? "unavailable" : "available"),
            selected_candidate_id: nonEmptyText(copySeed.selected_candidate_id, "No advisory next action candidate selected."),
            selected_candidate_label: nonEmptyText(copySeed.selected_candidate_label, "No selected candidate label."),
            preview_text: nonEmptyText(
              copySeed.preview_text,
              [
                "Augnes Project Constellation handoff seed",
                "No Project Constellation route payload was returned. This fallback does not invent missing context and does not execute Codex.",
              ].join("\n")
            ),
            source_refs: safeArray(copySeed.source_refs),
            required_checks: safeArray(copySeed.required_checks),
            skipped_check_policy: nonEmptyText(copySeed.skipped_check_policy, "Report every skipped check with a concrete reason."),
            final_report_requirements: safeArray(copySeed.final_report_requirements),
            boundary_text: safeArray(copySeed.boundary_text).length
              ? safeArray(copySeed.boundary_text)
              : [
                  "This preview is read-only.",
                  "This preview cannot execute Codex.",
                  "This preview cannot record proof or evidence.",
                  "This preview cannot commit or reject Augnes state.",
                  "This preview cannot create branches or PRs.",
                  "This preview cannot approve, publish, retry, replay, externally post, merge, deploy, or enable auto-merge.",
                  "Evidence pointers are pointer-only.",
                  "Next action candidates are advisory.",
                  "A copied handoff seed is manual preview text only.",
                  "Durable approval remains user/Core gated.",
                ],
          },
          missing_data_fallbacks: missingDataFallbacks,
        };
      }

      function renderCopyableConstellationHandoff(seed) {
        const root = el("div", { className: "stack" });
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The handoff seed is manual preview text; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, create branches or PRs, merge, or publish.",
        });
        status.setAttribute("aria-live", "polite");
        const copyRow = el("div", { className: "copy-row" });
        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.textContent = "Copy Handoff Preview";
        copyButton.addEventListener("click", async () => {
          try {
            if (!navigator.clipboard?.writeText) {
              throw new Error("Clipboard unavailable.");
            }
            await navigator.clipboard.writeText(seed.preview_text);
            status.textContent = "Handoff preview copied.";
          } catch {
            status.textContent = "Copy unavailable. Select and copy the preview text manually.";
          }
        });
        copyRow.appendChild(copyButton);
        root.append(status, copyRow, createPreBlock(seed.preview_text));
        return root;
      }

        root.appendChild(createSection("Pointer-only evidence refs", createList(preview.evidence_pointers, createConstellationEvidenceCard), { badge: `${preview.evidence_pointers.length}` }));
        root.appendChild(createSection("Unresolved tensions", createList(preview.unresolved_tensions, createConstellationTensionCard), { badge: `${preview.unresolved_tensions.length}` }));
        root.appendChild(createSection("Advisory next action candidates", createList(preview.next_action_candidates, createConstellationNextActionCard), { badge: `${preview.next_action_candidates.length}` }));
        root.appendChild(createSection("Copyable handoff seed", renderCopyableConstellationHandoff(preview.copyable_handoff_seed), { badge: preview.copyable_handoff_seed.status }));
        root.appendChild(createSection("Missing data fallbacks", createTextList(preview.missing_data_fallbacks), { badge: `${preview.missing_data_fallbacks.length}`, open: preview.missing_data_fallbacks.length > 0 }));
        root.appendChild(createSection("Preview boundary", createTextList(preview.copyable_handoff_seed.boundary_text), { badge: "read-only" }));
        return root;
      }

      function updateShellState(panel, profile = uiState.profile) {
        uiState.lastPanel = panel || "text";
        uiState.lastUpdated = new Date();
        uiState.profile = profile;
        panelChipEl.textContent = uiState.lastPanel;
        profileChipEl.textContent = `profile: ${uiState.profile}`;
        updatedChipEl.textContent = uiState.lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function renderPanel(data) {
        panelEl.replaceChildren();
        const profile = resolveProfile(data);

        if (!data) {
          panelTitleEl.textContent = "Console Panel";
          panelEl.appendChild(el("div", { className: "status-box", text: "No structured content yet." }));
          updateShellState("idle");
          return;
        }

        if (data.error) {
          panelTitleEl.textContent = "Tool Error";
          panelEl.appendChild(renderError(data.error));
          if (data.error.tool || data.error.mode) {
            panelEl.appendChild(createMetricGrid([
              ["Tool", data.error.tool || "unknown"],
              ["Mode", data.error.mode || "unknown"],
              ["Profile", data.error.profile || profile],
              ["Read-only", String(Boolean(data.error.readOnly))],
            ]));
          }
          updateShellState("error", profile);
          return;
        }

        switch (data.panel) {
          case "casefile":
            panelTitleEl.textContent = "Casefile";
            panelEl.appendChild(renderCasefile(data.casefile));
            updateShellState("casefile", profile);
            return;
          case "working_view":
            panelTitleEl.textContent = "Working View";
            panelEl.appendChild(renderWorkingView(data.workingView));
            updateShellState("working_view", profile);
            return;
          case "strategy":
            panelTitleEl.textContent = "Strategy";
            panelEl.appendChild(renderStrategy(data.strategy, profile, data.presentation));
            updateShellState("strategy", profile);
            return;
          case "boundary":
            panelTitleEl.textContent = "Boundary Packet";
            panelEl.appendChild(renderBoundary(data.packet, profile));
            updateShellState("boundary", profile);
            return;
          case "continuity":
            panelTitleEl.textContent = "Continuity Report";
            panelEl.appendChild(renderContinuity(data.continuity, profile));
            updateShellState("continuity", profile);
            return;
          case "repo":
            panelTitleEl.textContent = "Repo Navigation";
            panelEl.appendChild(renderRepo(data.repo));
            updateShellState("repo", profile);
            return;
          case "audit":
            panelTitleEl.textContent = "Governance Audit";
            panelEl.appendChild(renderAudit(data.audit, profile));
            updateShellState("audit", profile);
            return;
          case "work_contract_card":
            panelTitleEl.textContent = "Work Contract Card";
            panelEl.appendChild(renderWorkContractCard(data));
            updateShellState("work_contract_card", profile);
            return;
          case "project_constellation_preview":
            panelTitleEl.textContent = "Project Constellation Preview";
            panelEl.appendChild(renderProjectConstellationPreview(data));
            updateShellState("project_constellation_preview", profile);
            return;
          default:
            panelTitleEl.textContent = "Structured Output";
            panelEl.appendChild(renderJson(data));
            updateShellState(data.panel || "structured", profile);
        }
      }

      function extractStructured(params) {
        if (params?.structuredContent) {
          return {
            ...params.structuredContent,
            profile: params?._meta?.profile || params.structuredContent.profile || "public",
          };
        }
        const first = params?.content?.[0]?.text;
        if (!first) return null;
        try {
          return {
            ...JSON.parse(first),
            profile: params?._meta?.profile || "public",
          };
        } catch {
          return { text: first, profile: params?._meta?.profile || "public" };
        }
      }

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") return;

          if (message.id && pending.has(message.id)) {
            const req = pending.get(message.id);
            pending.delete(message.id);
            if (message.error) req.reject(message.error);
            else req.resolve(message.result);
            return;
          }

          if (typeof message.method !== "string") return;
          if (message.method === "ui/notifications/tool-result") {
            statusEl.textContent = "Tool output received. Text output remains authoritative if the panel cannot render.";
            renderPanel(extractStructured(message.params));
          }
        },
        { passive: true }
      );

      async function init() {
        try {
          await rpcRequest("ui/initialize", {
            appInfo: { name: "augnes-console-widget", version: "0.1.0" },
            appCapabilities: {},
            protocolVersion: "2026-01-26",
          });
          rpcNotify("ui/notifications/initialized", {});
          statusEl.textContent = "Widget initialized. Run one of the public read-only tools to populate the console.";
        } catch (error) {
          statusEl.textContent = `Failed to initialize widget bridge: ${String(error)}`;
          statusEl.classList.add("error-box");
        }
      }

      init();
    </script>
  </body>
</html>
