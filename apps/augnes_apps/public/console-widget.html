<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Augnes Console</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        --bg: color-mix(in srgb, canvas 90%, #dbe4ea 10%);
        --card: color-mix(in srgb, canvas 92%, #f1f5f7 8%);
        --border: color-mix(in srgb, canvastext 14%, transparent);
        --muted: color-mix(in srgb, canvastext 62%, transparent);
        --accent: #0f5f7a;
        --accent-soft: rgba(15, 95, 122, 0.12);
        --good: #1d6b3f;
        --warn: #9c6700;
        --bad: #a03232;
        --shadow: 0 12px 28px rgba(18, 34, 44, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(15, 95, 122, 0.14), transparent 32%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 32%),
          var(--bg);
        color: canvastext;
      }

      .shell {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .panel,
      .hero {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 16px;
        display: grid;
        gap: 10px;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .hero h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.2;
      }

      .hero p,
      .muted {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .chip-row,
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 12px;
        line-height: 1.2;
        background: rgba(255, 255, 255, 0.45);
      }

      .tag {
        border-radius: 12px;
      }

      .tag.fetchable {
        border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
        background: color-mix(in srgb, var(--accent-soft) 70%, transparent);
      }

      .tone-pass {
        color: var(--good);
        border-color: color-mix(in srgb, var(--good) 40%, var(--border));
      }

      .tone-warn {
        color: var(--warn);
        border-color: color-mix(in srgb, var(--warn) 40%, var(--border));
      }

      .tone-fail {
        color: var(--bad);
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
      }

      .panel {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
      }

      .summary {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
        background: color-mix(in srgb, var(--accent-soft) 55%, canvas 45%);
        font-size: 14px;
        line-height: 1.55;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.4);
      }

      .metric dt {
        margin: 0 0 6px 0;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .metric dd {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        word-break: break-word;
      }

      details {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      .section-body {
        padding: 0 14px 14px 14px;
        display: grid;
        gap: 10px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        display: grid;
        gap: 6px;
        background: rgba(255, 255, 255, 0.36);
      }

      .item.selected-item {
        border-color: color-mix(in srgb, var(--accent) 58%, var(--border));
        background: color-mix(in srgb, var(--accent-soft) 70%, canvas 30%);
      }

      .handoff-use-button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--border));
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.44);
        color: canvastext;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        min-height: 32px;
        padding: 6px 10px;
      }

      .handoff-use-button[aria-pressed="true"] {
        background: color-mix(in srgb, var(--accent) 88%, canvastext 12%);
        border-color: color-mix(in srgb, var(--accent) 70%, var(--border));
        color: white;
      }

      .handoff-use-button:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, canvastext);
        outline-offset: 2px;
      }

      .item-title {
        font-weight: 600;
        line-height: 1.35;
      }

      .item-note,
      .meta-line {
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }

      .code-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .code {
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
        padding: 5px 8px;
        border-radius: 10px;
        background: rgba(19, 37, 49, 0.08);
        border: 1px solid var(--border);
        word-break: break-all;
      }

      .recommended {
        padding: 14px;
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(15, 95, 122, 0.92), rgba(18, 54, 69, 0.92)),
          var(--accent);
        color: white;
      }

      .recommended small {
        display: block;
        opacity: 0.78;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .recommended strong {
        display: block;
        font-size: 20px;
      }

      .recommended .item-note,
      .recommended .meta-line {
        color: rgba(255, 255, 255, 0.82);
      }

      .status-box {
        padding: 12px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .copy-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .copy-button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--accent) 52%, var(--border));
        border-radius: 12px;
        background: color-mix(in srgb, var(--accent) 88%, canvastext 12%);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 36px;
        padding: 7px 12px;
      }

      .copy-button:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, canvastext);
        outline-offset: 2px;
      }

      .error-box {
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
        color: var(--bad);
        background: rgba(160, 50, 50, 0.08);
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(19, 37, 49, 0.08);
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 10px;
        }

        .hero,
        .panel {
          border-radius: 14px;
          padding: 12px;
        }

        .hero-top,
        .panel-head {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1>Augnes: Evidence &amp; Continuity Console</h1>
            <p>Read-first surface only. Augnes Core remains the authority holder.</p>
          </div>
          <div class="stat-row">
            <span class="chip">v1 read-only</span>
            <span id="profile-chip" class="chip">profile: public</span>
          </div>
        </div>
        <div class="chip-row">
          <span class="chip">evidence-backed</span>
          <span class="chip">boundary-aware</span>
          <span class="chip">continuity-visible</span>
          <span class="chip">no canonical writes</span>
        </div>
        <div id="status" class="status-box">Waiting for tool output…</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="panel-title">Console Panel</h2>
          <div class="stat-row">
            <span id="panel-chip" class="chip">idle</span>
            <span id="updated-chip" class="chip">not updated</span>
          </div>
        </div>
        <div id="panel"></div>
      </section>
    </div>

    <script type="module">
      const statusEl = document.getElementById("status");
      const panelEl = document.getElementById("panel");
      const panelTitleEl = document.getElementById("panel-title");
      const panelChipEl = document.getElementById("panel-chip");
      const updatedChipEl = document.getElementById("updated-chip");
      const profileChipEl = document.getElementById("profile-chip");

      let requestId = 0;
      const pending = new Map();
      const uiState = {
        lastPanel: "idle",
        lastUpdated: null,
        profile: "public",
      };

      function rpcRequest(method, params) {
        return new Promise((resolve, reject) => {
          const id = `req-${++requestId}`;
          pending.set(id, { resolve, reject });
          window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        });
      }

      function rpcNotify(method, params) {
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      }

      function el(tag, options = {}) {
        const node = document.createElement(tag);
        if (options.className) node.className = options.className;
        if (options.text) node.textContent = options.text;
        if (options.html) node.innerHTML = options.html;
        return node;
      }

      function codeChip(text) {
        return el("span", { className: "code", text });
      }

      function badge(text, tone) {
        const className = tone ? `chip tone-${tone}` : "chip";
        return el("span", { className, text });
      }

      function tag(text, options = {}) {
        const className = `tag${options.fetchable ? " fetchable" : ""}${options.tone ? ` tone-${options.tone}` : ""}`;
        return el("span", { className, text });
      }

      function createMetricGrid(entries) {
        const grid = el("dl", { className: "metric-grid" });
        entries.forEach(([label, value]) => {
          const card = el("div", { className: "metric" });
          const dt = el("dt", { text: label });
          const dd = el("dd", { text: value });
          card.append(dt, dd);
          grid.appendChild(card);
        });
        return grid;
      }

      function createSection(title, contentNode, options = {}) {
        const details = document.createElement("details");
        details.open = options.open !== false;
        const summary = document.createElement("summary");
        summary.append(el("span", { text: title }));
        if (options.badge) {
          summary.appendChild(tag(options.badge));
        }
        const body = el("div", { className: "section-body" });
        body.appendChild(contentNode);
        details.append(summary, body);
        return details;
      }

      function resolveProfile(data) {
        return data?.profile === "chrono_lab" ? "chrono_lab" : "public";
      }

      function isLabProfile(profile) {
        return profile === "chrono_lab";
      }

      function createList(items, renderItem) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("div", { className: "stack" });
        items.forEach((item) => list.appendChild(renderItem(item)));
        return list;
      }

      function createTextList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("ul", { className: "list" });
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
        return list;
      }

      function createCodeList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const wrap = el("div", { className: "code-list" });
        items.forEach((item) => wrap.appendChild(codeChip(item)));
        return wrap;
      }

      function createEvidenceCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title || item.id }));
        if (item.stance) {
          const tone = item.stance === "supporting" ? "pass" : item.stance === "contradicting" ? "fail" : "";
          titleRow.appendChild(tag(item.stance, { tone }));
        }
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        if (item.note) {
          card.appendChild(el("div", { className: "item-note", text: item.note }));
        }
        if (item.url) {
          card.appendChild(el("div", { className: "item-note", text: item.url }));
        }
        return card;
      }

      function createRepoNodeCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.kind));
        titleRow.appendChild(tag(item.fetchable ? "fetchable" : "view-only", { fetchable: item.fetchable }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `Node: ${item.nodeId}` }));
        return card;
      }

      function createGateCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.gate }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createTransitionCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.scenario }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createCarryForwardCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.stage));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.why }));
        return card;
      }

      function createTraceCapsuleCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: item.title }));
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.reuseValue }));
        return card;
      }

      function renderJson(value) {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(value, null, 2);
        return pre;
      }

      function createPreBlock(text) {
        const pre = document.createElement("pre");
        pre.textContent = text;
        return pre;
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            if (!navigator.clipboard?.readText) return false;
            return (await navigator.clipboard.readText()) === text;
          } catch {
            // Developer Mode iframes may block Clipboard API while preserving user activation.
          }
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "0";
        textarea.style.opacity = "0";
        document.body?.appendChild(textarea);

        let copiedViaEvent = false;
        const handleCopy = (event) => {
          if (!event.clipboardData?.setData) return;
          event.clipboardData.setData("text/plain", text);
          event.preventDefault?.();
          copiedViaEvent = true;
        };
        document.addEventListener?.("copy", handleCopy);
        try {
          textarea.focus?.();
          textarea.select?.();
          textarea.setSelectionRange?.(0, textarea.value.length);
          if (document.execCommand?.("copy") !== true || !copiedViaEvent) {
            return false;
          }
          if (navigator.clipboard?.readText) {
            try {
              return (await navigator.clipboard.readText()) === text;
            } catch {
              return false;
            }
          }
          return false;
        } catch {
          return false;
        } finally {
          document.removeEventListener?.("copy", handleCopy);
          textarea.remove?.();
        }
      }

      function selectElementText(element) {
        try {
          if (!element || !document.createRange || !window.getSelection) return false;
          const range = document.createRange();
          range.selectNodeContents(element);
          const selection = window.getSelection();
          if (!selection) return false;
          selection.removeAllRanges();
          selection.addRange(range);
          return true;
        } catch {
          return false;
        }
      }

      function isKnownCoreHandoffUsage(value) {
        return value === "planning_only" || value === "implementation_ready" || value === "implementation_requires_full_context";
      }

      function defaultHandoffDecisionForUsage(coreHandoffUsage, implementationAnchorCount) {
        const base = {
          decision_type: "codex_handoff_recommendation",
          status: "ready",
          core_handoff_usage: coreHandoffUsage,
          implementation_anchor_count: implementationAnchorCount,
          recommended_for_planning: "core_handoff",
          user_confirmation_items: [
            "I know whether I'm asking Codex for planning or implementation.",
            "I checked whether Full Context is required.",
            "I checked expected checks.",
            "I will paste the selected packet into a separate Codex session.",
          ],
          boundary_text: [
            "Codex handoff recommendation is read-only guidance for choosing copied packet text.",
            "The recommendation panel does not run Codex.",
            "The recommendation panel does not create branches or PRs.",
            "The recommendation panel does not record proof or evidence.",
            "The recommendation panel does not mutate Augnes state.",
          ],
        };
        if (coreHandoffUsage === "implementation_ready") {
          return {
            ...base,
            recommended_for_implementation: "core_handoff",
            recommendation_reason: "Core includes implementation anchors. Confirm anchors before editing.",
            blocking_reason: "",
          };
        }
        if (coreHandoffUsage === "planning_only") {
          return {
            ...base,
            recommended_for_implementation: "full_context_or_implementation_anchors",
            recommendation_reason: "Core is enough for planning. For implementation, use Full Context or provide implementation anchors.",
            blocking_reason: "Core is marked planning-only for implementation work.",
          };
        }
        return {
          ...base,
          recommended_for_implementation: "full_context",
          recommendation_reason: "Core is enough for planning. Full Context is required before implementation because implementation file/schema anchors are missing.",
          blocking_reason: "Implementation file/schema anchors are missing from Core.",
        };
      }

      function normalizeCodexHandoffDecision(source, corePacket) {
        const record = safeRecord(source);
        const core = safeRecord(corePacket);
        const implementationAnchors = safeArray(core.implementation_anchors);
        const sourceAnchorCount = Number(record.implementation_anchor_count);
        const implementationAnchorCount = Number.isFinite(sourceAnchorCount)
          ? sourceAnchorCount
          : implementationAnchors.length;
        const fallbackUsage = implementationAnchors.length
          ? "implementation_ready"
          : core.full_context_required_before_implementation === true
            ? "implementation_requires_full_context"
            : "";
        const coreHandoffUsage = nonEmptyText(record.core_handoff_usage, nonEmptyText(core.core_handoff_usage, fallbackUsage));
        if (record.status === "unavailable" || !isKnownCoreHandoffUsage(coreHandoffUsage)) {
          return {
            decision_type: "codex_handoff_recommendation",
            status: "unavailable",
            core_handoff_usage: "unavailable",
            implementation_anchor_count: implementationAnchorCount,
            recommended_for_planning: "unavailable",
            recommended_for_implementation: "unavailable",
            recommendation_reason: nonEmptyText(
              record.recommendation_reason,
              "Codex handoff recommendation is unavailable. Review Core and Full Context details before choosing what to copy."
            ),
            user_confirmation_items: safeArray(record.user_confirmation_items),
            blocking_reason: nonEmptyText(record.blocking_reason, "Core Handoff usage is unavailable."),
            boundary_text: safeArray(record.boundary_text),
          };
        }
        const fallback = defaultHandoffDecisionForUsage(coreHandoffUsage, implementationAnchorCount);
        return {
          ...fallback,
          ...record,
          status: record.status === "unavailable" ? "unavailable" : "ready",
          core_handoff_usage: coreHandoffUsage,
          implementation_anchor_count: implementationAnchorCount,
          recommended_for_planning: nonEmptyText(record.recommended_for_planning, fallback.recommended_for_planning),
          recommended_for_implementation: nonEmptyText(record.recommended_for_implementation, fallback.recommended_for_implementation),
          recommendation_reason: nonEmptyText(record.recommendation_reason, fallback.recommendation_reason),
          user_confirmation_items: safeArray(record.user_confirmation_items).length ? safeArray(record.user_confirmation_items) : fallback.user_confirmation_items,
          blocking_reason: nonEmptyText(record.blocking_reason, fallback.blocking_reason),
          boundary_text: safeArray(record.boundary_text).length ? safeArray(record.boundary_text) : fallback.boundary_text,
        };
      }

      function handoffRecommendationLabel(value) {
        if (value === "core_handoff") return "Core Handoff";
        if (value === "full_context") return "Full Context";
        if (value === "full_context_or_implementation_anchors") return "Full Context or implementation anchors";
        return "Recommendation unavailable";
      }

      function handoffRecommendationAction(value) {
        if (value === "core_handoff") return "Copy Codex Handoff";
        if (value === "full_context") return "Copy Full Context";
        if (value === "full_context_or_implementation_anchors") return "Copy Full Context or provide implementation anchors";
        return "Review packet details";
      }

      function renderCodexHandoffDecisionPanel(decision) {
        const normalized = normalizeCodexHandoffDecision(decision, {});
        const root = el("div", { className: "item selected-item" });
        root.appendChild(el("div", { className: "item-title", text: "Codex handoff recommendation" }));
        if (normalized.status === "unavailable") {
          root.appendChild(el("div", { className: "item-note", text: normalized.recommendation_reason }));
          root.appendChild(el("div", { className: "item-note", text: "No copy recommendation is inferred from unavailable Core data." }));
          return root;
        }
        root.appendChild(el("div", { className: "item-title", text: "What to copy" }));
        root.appendChild(createMetricGrid([
          ["For planning", `${handoffRecommendationLabel(normalized.recommended_for_planning)} - ${handoffRecommendationAction(normalized.recommended_for_planning)}`],
          ["For implementation", `${handoffRecommendationLabel(normalized.recommended_for_implementation)} - ${handoffRecommendationAction(normalized.recommended_for_implementation)}`],
        ]));
        root.appendChild(el("div", { className: "item-title", text: "Why this recommendation" }));
        root.appendChild(el("div", { className: "item-note", text: normalized.recommendation_reason }));
        if (normalized.recommended_for_implementation === "core_handoff") {
          root.appendChild(el("div", { className: "item-note", text: "Core can be used for implementation planning. Confirm anchors before editing." }));
        }
        root.appendChild(el("div", { className: "item-title", text: "What the user confirms" }));
        root.appendChild(createTextList(normalized.user_confirmation_items));
        return root;
      }

      function renderCopyableHandoffPacket(preview) {
        const root = el("div", { className: "stack" });
        const corePacket = safeRecord(preview.core_codex_handoff_packet || preview.codex_core_handoff_packet);
        const fullPacket = safeRecord(preview.full_codex_handoff_packet || preview.final_codex_handoff_packet || preview.codex_final_handoff_packet);
        const handoffDecision = normalizeCodexHandoffDecision(
          preview.codex_handoff_decision || preview.codex_handoff_recommendation || preview.external_codex_handoff_gate_preview,
          corePacket
        );
        const fallbackPacketText = nonEmptyText(preview.copyable_handoff_text, "");
        const corePacketText = nonEmptyText(
          preview.copyable_core_handoff_text || corePacket.copyable_core_handoff_text || corePacket.copyable_handoff_text,
          fallbackPacketText
        );
        const fullPacketText = nonEmptyText(
          preview.copyable_full_handoff_text || fullPacket.copyable_full_handoff_text || fullPacket.copyable_handoff_text,
          fallbackPacketText
        );
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The packet is for a separate Codex session; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, merge, or enable auto-merge.",
        });
        status.setAttribute("aria-live", "polite");
        const preflightHint = el("div", {
          className: "status-box",
          text:
            "After copying, validate locally with codex:handoff-preflight. Copy this packet into a file or stdin before using it in a separate Codex session. Default mode checks copied packets; strict mode requires concrete current-runtime confirmation.",
        });
        const copyRow = el("div", { className: "copy-row" });
        const corePre = createPreBlock(corePacketText);
        const fullPre = createPreBlock(fullPacketText);
        const corePacketTextSection = createSection("Core packet text", corePre, { badge: "short", open: false });
        const fullPacketTextSection = createSection("Full packet text", fullPre, { badge: "full context", open: false });

        function createCopyButton({ label, packetText, packetSection, pre, successText }) {
          const copyButton = document.createElement("button");
          copyButton.type = "button";
          copyButton.className = "copy-button";
          copyButton.textContent = label;
          copyButton.addEventListener("click", async () => {
            if (await copyTextToClipboard(packetText)) {
              status.textContent = successText;
            } else {
              packetSection.open = true;
            }
            if (status.textContent === successText) {
              return;
            }
            if (selectElementText(pre)) {
              status.textContent = "Clipboard blocked by this host. Packet text selected; press Command+C to copy.";
            } else {
              status.textContent = "Copy unavailable. Select and copy the packet text manually.";
            }
          });
          return copyButton;
        }

        const coreCopyButton = createCopyButton({
          label: "Copy Codex Handoff",
          packetText: corePacketText,
          packetSection: corePacketTextSection,
          pre: corePre,
          successText: "Core handoff copied.",
        });
        const fullCopyButton = createCopyButton({
          label: "Copy Full Context",
          packetText: fullPacketText,
          packetSection: fullPacketTextSection,
          pre: fullPre,
          successText: "Full handoff copied.",
        });
        copyRow.append(coreCopyButton, fullCopyButton);
        root.append(
          renderCodexHandoffDecisionPanel(handoffDecision),
          status,
          el("div", { className: "status-box", text: "Core: Shorter packet for starting Codex work." }),
          el("div", { className: "status-box", text: "Full: Full context and appendices." }),
          preflightHint,
          copyRow,
          corePacketTextSection,
          fullPacketTextSection
        );
        return root;
      }

      function nonEmptyText(value, fallback) {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      function safeArray(value) {
        if (!Array.isArray(value)) return [];
        return value.filter((item) => typeof item === "string" && item.trim()).map((item) => item.trim());
      }

      function safeCount(value) {
        return Number.isFinite(value) ? String(value) : "0";
      }

      function formatUiStatus(value) {
        const text = nonEmptyText(value, "unknown");
        const labels = {
          attached: "Attached",
          awaiting_user_confirmation: "Needs user confirmation",
          blocked: "Blocked",
          explicit_absent: "Not attached",
          explicitly_absent: "Not attached",
          fail: "Needs fixes",
          missing: "Missing",
          needs_attention: "Needs attention",
          needs_result_input: "Needs result input",
          needs_revision: "Needs revision",
          needs_review: "Needs review",
          needs_user_core_confirmation: "Needs user confirmation",
          needs_user_core_input: "Needs user confirmation",
          no_match: "No matching memory",
          not_configured: "Not configured",
          not_generated: "Not ready",
          not_provided: "Not provided",
          pass: "Ready",
          pending_preflight: "Pending check",
          preview_only: "Preview only",
          preview_ready: "Ready to review",
          proposed: "Reference memory attached",
          ready: "Ready",
          ready_for_human_review: "Ready for human review",
          structured_payload: "Structured result",
          unavailable: "Unavailable",
          warn: "Needs attention",
        };
        const fallback = text.replace(/_/g, " ");
        return labels[text] || `${fallback.charAt(0).toUpperCase()}${fallback.slice(1)}`;
      }

      function formatUiSlotLabel(value) {
        const text = nonEmptyText(value, "Item");
        const labels = {
          "Codex result review packet": "Work result review",
          "Memory Reuse attachment": "Reference memory",
          "PR body checklist": "PR writing checklist",
        };
        return labels[text] || text;
      }

      function formatSourcePacketRef(packetRef, workId) {
        const id = nonEmptyText(workId, "");
        return id ? `Final handoff package for ${id}` : formatUiStatus(packetRef);
      }

      function formatConfirmationField(value) {
        const text = nonEmptyText(value, "confirmation item");
        const labels = {
          authority_boundary_reviewed: "Review the guardrails.",
          branch_and_pr_authority_confirmed_separately: "Confirm branch or PR authority separately if needed.",
          confirmed_scope: "Confirm the work scope.",
          confirmed_work_id: "Confirm the work ID.",
          current_runtime_endpoint: "Confirm the current runtime endpoint.",
          expected_checks_reviewed: "Review expected checks.",
          expected_files_reviewed: "Review expected files.",
          explicit_user_request_for_separate_codex_session: "Ask for a separate Codex session explicitly.",
          memory_reuse_status_reviewed: "Review reference memory status.",
          proof_and_evidence_recording_authority_confirmed_separately: "Confirm proof or evidence recording separately if needed.",
          project_constellation_context_reviewed: "Review related perspective context.",
          result_review_packet_return_expected: "Expect a result review packet after the work.",
        };
        return labels[text] || text.replace(/_/g, " ");
      }

      function formatPrSectionLabel(value) {
        const text = nonEmptyText(value, "Section");
        const labels = {
          "Authority boundary statement": "Guardrail statement",
          "Final handoff preflight status": "Final readiness check",
          "Memory Reuse attachment status": "Reference memory status",
          "Next recommended step": "Next step",
          "Project Constellation context status": "Related perspective status",
          "Skipped checks and caveats": "Skipped checks and notes",
          "User-facing path added or changed": "User-facing path",
        };
        return labels[text] || text;
      }

      function formatResultInputField(value) {
        const text = nonEmptyText(value, "Result input");
        const labels = {
          "Authority boundary statement.": "Guardrail statement.",
          "PR URL/number only if a separate read-only GitHub connector/reviewer flow is explicitly run outside the App/MCP server.":
            "PR link only if a separate read-only review flow was explicitly used.",
        };
        return labels[text] || text;
      }

      function isCompletedWorkStatus(status) {
        return ["completed", "done", "cancelled", "canceled", "archived"].includes(nonEmptyText(status, "").toLowerCase());
      }

      function numberOrZero(value) {
        return Number.isFinite(value) ? value : 0;
      }

      function countArrayLike(value) {
        return Array.isArray(value) ? value.length : 0;
      }

      function createCodeListWithFallback(items, fallback) {
        const list = safeArray(items);
        if (!list.length) {
          return el("div", { className: "status-box", text: fallback });
        }
        return createCodeList(list);
      }

      function safeRecord(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function safeRecordArray(value) {
        return Array.isArray(value) ? value.filter((item) => item && typeof item === "object" && !Array.isArray(item)) : [];
      }

      function firstRecord(...values) {
        for (const value of values) {
          const record = safeRecord(value);
          if (Object.keys(record).length) return record;
        }
        return {};
      }

      function sourceRefText(sourceRef) {
        if (typeof sourceRef === "string") return sourceRef;
        const record = safeRecord(sourceRef);
        return nonEmptyText(record.source_ref || record.target_ref || record.label || record.id, "");
      }

      function summarizeContextEvidenceRef(item) {
        const record = safeRecord(item);
        const pointerId = nonEmptyText(record.pointer_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const targetRef = nonEmptyText(record.target_ref, "");
        return [pointerId, label, targetRef ? `-> ${targetRef}` : ""].filter(Boolean).join(": ");
      }

      function summarizeContextTension(item) {
        const record = safeRecord(item);
        const tensionId = nonEmptyText(record.tension_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const summary = nonEmptyText(record.summary, "");
        return [tensionId, label, summary].filter(Boolean).join(": ");
      }

      function summarizeContextNextAction(item) {
        const record = safeRecord(item);
        const candidateId = nonEmptyText(record.candidate_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const summary = nonEmptyText(record.summary, "");
        return [candidateId, label, summary].filter(Boolean).join(": ");
      }

      function normalizeWorkContractConstellationContext(data) {
        const card = safeRecord(data?.work_contract_card);
        const preview = safeRecord(data?.project_constellation_preview);
        const compact = firstRecord(
          data?.work_contract_constellation_context,
          data?.constellation_context,
          card.constellation_context,
          safeRecord(data?.codex_handoff_preview).constellation_context,
          preview
        );
        const project = safeRecord(compact.project_constellation || data?.project_constellation);
        const thesis = nonEmptyText(compact.thesis || project.thesis, "");

        if (!Object.keys(compact).length || !thesis) {
          return {
            status: "missing",
            fallback_text: "No Project Constellation context is attached to this work contract.",
            thesis: "",
            selected_candidate_id: "",
            selected_candidate_label: "",
            selection_status: "",
            selection_fallback_reason: "",
            pointer_evidence_ref_count: 0,
            pointer_evidence_refs: [],
            unresolved_tension_count: 0,
            unresolved_tensions: [],
            advisory_next_action_summary: "",
            source_refs: [],
            boundary_text: [
              "Project Constellation context is optional read-only operator context.",
              "Missing context is not reconstructed or invented.",
            ],
          };
        }

        const selection = safeRecord(compact.selection);
        const copySeed = safeRecord(compact.copyable_handoff_seed);
        const evidencePointers = safeRecordArray(compact.evidence_pointers || data?.evidence_pointers || project.evidence_pointers);
        const unresolvedTensions = safeRecordArray(compact.unresolved_tensions || data?.unresolved_tensions || project.unresolved_tensions);
        const nextActionCandidates = safeRecordArray(compact.next_action_candidates || data?.next_action_candidates || project.next_action_candidates);
        const selectedCandidateId = nonEmptyText(
          compact.selected_candidate_id || selection.selected_candidate_id || copySeed.selected_candidate_id,
          ""
        );
        const selectedCandidate =
          selectedCandidateId
            ? nextActionCandidates.find((candidate) => nonEmptyText(candidate.candidate_id, "") === selectedCandidateId)
            : nextActionCandidates[0];
        const pointerRefs = safeArray(compact.pointer_evidence_refs || compact.evidence_refs);
        const summarizedPointerRefs = pointerRefs.length
          ? pointerRefs
          : evidencePointers.map(summarizeContextEvidenceRef).filter(Boolean);
        const tensionRefs = safeArray(compact.unresolved_tensions || compact.tension_refs);
        const summarizedTensions = tensionRefs.length
          ? tensionRefs
          : unresolvedTensions.map(summarizeContextTension).filter(Boolean);
        const compactSourceRefs = safeArray(compact.source_refs).length
          ? safeArray(compact.source_refs)
          : safeRecordArray(compact.source_refs).map(sourceRefText).filter(Boolean);
        const dataSourceRefs = safeArray(data?.source_refs).length
          ? safeArray(data?.source_refs)
          : safeRecordArray(data?.source_refs).map(sourceRefText).filter(Boolean);

        return {
          status: "attached",
          fallback_text: "",
          thesis,
          selected_candidate_id: selectedCandidateId,
          selected_candidate_label: nonEmptyText(
            compact.selected_candidate_label || selection.selected_candidate_label || copySeed.selected_candidate_label || selectedCandidate?.label,
            ""
          ),
          selection_status: nonEmptyText(compact.selection_status || selection.selection_status || copySeed.selection_status, ""),
          selection_fallback_reason: nonEmptyText(
            compact.selection_fallback_reason || selection.selection_fallback_reason || copySeed.selection_fallback_reason,
            ""
          ),
          pointer_evidence_ref_count: Number.isFinite(compact.pointer_evidence_ref_count)
            ? compact.pointer_evidence_ref_count
            : summarizedPointerRefs.length,
          pointer_evidence_refs: summarizedPointerRefs.slice(0, 5),
          unresolved_tension_count: Number.isFinite(compact.unresolved_tension_count)
            ? compact.unresolved_tension_count
            : summarizedTensions.length,
          unresolved_tensions: summarizedTensions.slice(0, 5),
          advisory_next_action_summary: nonEmptyText(
            compact.advisory_next_action_summary || compact.next_action_summary || summarizeContextNextAction(selectedCandidate),
            ""
          ),
          source_refs: (compactSourceRefs.length ? compactSourceRefs : dataSourceRefs).slice(0, 5),
          boundary_text: safeArray(compact.boundary_text).length
            ? safeArray(compact.boundary_text)
            : [
                "Project Constellation context is read-only operator context.",
                "Evidence refs remain pointer-only.",
                "Unresolved tensions remain unresolved.",
                "Advisory next action context does not execute Codex.",
                "This context cannot record proof or evidence, mutate Augnes state, create branches or PRs, merge, publish, retry, replay, or deploy.",
              ],
        };
      }

      function constellationContextPacketLines(context) {
        if (!context || context.status !== "attached") {
          return ["- No Project Constellation context is attached to this work contract."];
        }
        return [
          `- Thesis: ${context.thesis}`,
          `- Selected candidate ID: ${context.selected_candidate_id || "missing"}`,
          `- Selected candidate label: ${context.selected_candidate_label || "missing"}`,
          `- Selection status: ${context.selection_status || "missing"}`,
          context.selection_fallback_reason ? `- Selection fallback: ${context.selection_fallback_reason}` : "- Selection fallback: none",
          `- Pointer-only evidence refs: ${safeCount(context.pointer_evidence_ref_count)}`,
          ...safeArray(context.pointer_evidence_refs).map((item) => `  - ${item}`),
          `- Unresolved tensions: ${safeCount(context.unresolved_tension_count)}`,
          ...safeArray(context.unresolved_tensions).map((item) => `  - ${item}`),
          `- Advisory next action: ${context.advisory_next_action_summary || "missing"}`,
          "- Source refs:",
          ...(safeArray(context.source_refs).length ? safeArray(context.source_refs).map((item) => `  - ${item}`) : ["  - No source refs attached."]),
        ];
      }

      function normalizeWorkPickerCandidate(item, recommendedWorkId) {
        const record = safeRecord(item);
        const links = safeRecord(record.links);
        const workId = nonEmptyText(record.work_id || record.workId, "No work ID listed.");
        const nextStep = nonEmptyText(record.next_step || record.next_action || record.nextAction, "No next step is listed for this work item.");
        const expectedFilesCount = Number.isFinite(record.expected_files_count)
          ? record.expected_files_count
          : countArrayLike(record.expected_files || links.expected_files);
        const expectedChecksCount = Number.isFinite(record.expected_checks_count)
          ? record.expected_checks_count
          : countArrayLike(record.expected_checks || links.expected_checks);
        const linkedDocsCount = Number.isFinite(record.linked_docs_count)
          ? record.linked_docs_count
          : countArrayLike(record.docs || links.docs);

        return {
          work_id: workId,
          title: nonEmptyText(record.title || record.work_title, "No work title listed."),
          status: nonEmptyText(record.status || record.work_status, "unknown"),
          priority: nonEmptyText(record.priority, "unknown"),
          summary: nonEmptyText(record.summary, "No summary is listed for this work item."),
          next_step: nextStep,
          user_attention_required: record.user_attention_required === true,
          related_state_keys_count: Number.isFinite(record.related_state_keys_count)
            ? record.related_state_keys_count
            : countArrayLike(record.related_state_keys),
          expected_files_count: expectedFilesCount,
          expected_checks_count: expectedChecksCount,
          linked_docs_count: linkedDocsCount,
          is_recommended: record.is_recommended === true || workId === recommendedWorkId,
          handoff_instruction: nonEmptyText(
            record.handoff_instruction,
            `Open this work with augnes_get_work_brief using workId: ${workId}.`
          ),
        };
      }

      function normalizeWorkPickerCard(data) {
        const source = safeRecord(data?.work_picker_card || data);
        const rawCandidates = safeRecordArray(source.work_candidates || data?.work_candidates || data?.workItems);
        const fallbackRecommended =
          rawCandidates.find((item) => !isCompletedWorkStatus(nonEmptyText(item.status || item.work_status, ""))) ||
          rawCandidates[0] ||
          null;
        const recommendedWorkId = nonEmptyText(
          source.recommended_work_id || data?.recommended_work_id || fallbackRecommended?.work_id || fallbackRecommended?.workId,
          ""
        );
        const candidates = rawCandidates.map((item) => normalizeWorkPickerCandidate(item, recommendedWorkId));
        const recommended = candidates.find((item) => item.work_id === recommendedWorkId) || candidates.find((item) => item.is_recommended) || null;
        const scope = nonEmptyText(source.scope || data?.scope, "No scope listed.");
        const hasExactlyOneCandidate = candidates.length === 1;
        const selectionReason = nonEmptyText(
          source.selection_reason || data?.selection_reason,
          recommended
            ? hasExactlyOneCandidate
              ? "Only work item found for this scope."
              : !isCompletedWorkStatus(recommended.status)
                ? "First active work item for this scope."
                : "First work item returned for this scope."
            : "No work items found for this scope."
        );

        return {
          card_type: "work_picker_card",
          title: nonEmptyText(source.title, "Choose a work item"),
          scope,
          candidate_count: Number.isFinite(source.candidate_count) ? source.candidate_count : candidates.length,
          recommended_work_id: recommended?.work_id || "",
          recommended_work_title: nonEmptyText(source.recommended_work_title, recommended?.title || ""),
          selection_reason: selectionReason,
          next_action_hint: nonEmptyText(
            source.next_action_hint || data?.next_action_hint,
            recommended
              ? `Open the recommended work with augnes_get_work_brief using workId: ${recommended.work_id}.`
              : "No work items found for this scope. Check the scope or select/create a work item elsewhere before opening a handoff card."
          ),
          handoff_tool_hint: nonEmptyText(
            source.handoff_tool_hint || data?.handoff_tool_hint,
            "When a user asks for a project handoff and no workId is known, list work items first, then call augnes_get_work_brief with the selected or recommended workId."
          ),
          empty_state: nonEmptyText(source.empty_state, candidates.length ? "" : "No work items found for this scope. Check the scope or select/create a work item elsewhere."),
          work_candidates: candidates,
          boundary_text: safeArray(source.boundary_text).length
            ? safeArray(source.boundary_text)
            : [
                "Work Picker is read-only.",
                "Work IDs are trace anchors, not committed state authority.",
                "Selecting a work item means choosing what to inspect next; it does not execute Codex.",
                "This card cannot create branches or PRs, call GitHub or providers, record proof or evidence, mutate Augnes state, approve, publish, merge, retry, replay, or deploy.",
              ],
        };
      }

      function normalizeWorkContractCard(data) {
        const card = data?.work_contract_card || {};
        const brief = data?.brief || {};
        const work = brief.work || {};
        const codexHandoff = brief.codex_handoff || {};
        const relatedProof = brief.related_proof || {};
        const expectedFiles = safeArray(card.expected_files).length
          ? safeArray(card.expected_files)
          : safeArray(codexHandoff.expected_files);
        const expectedChecks = safeArray(card.expected_checks).length
          ? safeArray(card.expected_checks)
          : safeArray(codexHandoff.expected_checks || codexHandoff.suggested_verification || codexHandoff.verification_commands);
        const relatedStateKeys = safeArray(card.related_state_keys).length
          ? safeArray(card.related_state_keys)
          : safeArray(brief.related_state_keys || work.related_state_keys);
        const boundaries = safeArray(card.authority_boundary_text).length
          ? safeArray(card.authority_boundary_text)
          : [
              "Work ID is a trace anchor, not committed state authority.",
              "This card is read-only.",
              "This card cannot execute Codex.",
              "This card cannot commit or reject Augnes state.",
              "This card cannot approve, publish, retry, replay, externally post, merge, or enable auto-merge.",
              "Proof is not approval.",
              "A PR is not merge authority.",
              "Durable approval remains user/Core gated.",
            ];

        return {
          scope: nonEmptyText(card.scope || brief.scope, "No scope listed."),
          work_id: nonEmptyText(card.work_id || brief.work_id || work.work_id, "No work ID listed."),
          work_title: nonEmptyText(card.work_title || work.title, "No work title listed."),
          work_status: nonEmptyText(card.work_status || work.status, "No status listed."),
          priority: nonEmptyText(card.priority || work.priority, "No priority listed."),
          current_or_next_step: nonEmptyText(
            card.current_or_next_step || brief.next_action || work.next_action || codexHandoff.task_brief,
            "No current or next step is listed in the work brief."
          ),
          expected_files: expectedFiles,
          expected_files_summary: nonEmptyText(card.expected_files_summary, "No expected files are listed in the work brief."),
          expected_checks: expectedChecks,
          expected_checks_summary: nonEmptyText(card.expected_checks_summary, "No expected checks are listed in the work brief."),
          related_state_keys: relatedStateKeys,
          related_state_keys_summary: nonEmptyText(card.related_state_keys_summary, "No related state keys are listed in the work brief."),
          recent_events_count: card.recent_events_count ?? brief.recent_events?.length ?? 0,
          linked_proof_action_ids_count: card.linked_proof_action_ids_count ?? relatedProof.action_ids?.length ?? 0,
          linked_prs_count: card.linked_prs_count ?? relatedProof.prs?.length ?? 0,
          linked_docs_count: card.linked_docs_count ?? relatedProof.docs?.length ?? 0,
          linked_proof_summary: nonEmptyText(card.linked_proof_summary, "No linked proof/action IDs are listed in the work brief."),
          proof_evidence_expectation_summary: nonEmptyText(
            card.proof_evidence_expectation_summary,
            "No proof/evidence expectation is listed in the work brief; proof and evidence remain separate from approval."
          ),
          skipped_check_expectation_summary: nonEmptyText(
            card.skipped_check_expectation_summary,
            "Skipped checks must be reported with concrete reasons; no per-check skipped expectation is listed in the work brief."
          ),
          constellation_context: normalizeWorkContractConstellationContext(data),
          authority_boundary_text: boundaries,
        };
      }

      function normalizeCodexHandoffPreview(data, card) {
        const preview = data?.codex_handoff_preview || {};
        const constellationContext = normalizeWorkContractConstellationContext({
          ...data,
          work_contract_card: {
            ...(data?.work_contract_card || {}),
            constellation_context: data?.work_contract_card?.constellation_context || card.constellation_context,
          },
        });
        const boundaryText = safeArray(preview.boundary_text).length
          ? safeArray(preview.boundary_text)
          : [
              "This preview is read-only.",
              "This preview cannot execute Codex.",

      function memoryReuseAttachmentBoundaryText() {

      function fallbackMemoryReuseBrief(status) {
        if (status === "not_configured") {
          return "Memory Reuse attachment proposal is not configured for this payload; no memory intake was run by this surface.";
        }
        if (status === "unavailable") {
          return "Memory Reuse attachment proposal is unavailable in this payload; no selected memory IDs were attached or invented.";
        }

          return "Selected persisted memory items are attached as read-only prior context; preserve the listed reuse boundaries.";

      function normalizeMemoryReuseSourceContext(value, fallback) {
        const sourceContext = nonEmptyText(value, "");
        return ["work_contract", "constellation_context", "final_handoff_packet"].includes(sourceContext)
          ? sourceContext

      }

      function selectedMemoryIdsFromProposal(source) {
        const direct = safeArray(source?.selected_memory_ids);
        const fromItems = safeRecordArray(source?.selected_memory_items)
          .map((item) => nonEmptyText(item.memory_item_id || item.item_id || item.id, ""))
          .filter(Boolean);
        return [...new Set([...direct, ...fromItems])];
      }

      function normalizeMemoryReuseAttachmentProposal(source, preview, card) {
        const record = safeRecord(source);
        const selectedIds = selectedMemoryIdsFromProposal(record);
        const statusSource = nonEmptyText(record.status, "");
        const validStatus = ["proposed", "no_match", "unavailable", "not_configured"].includes(statusSource)
          ? statusSource
          : "";
        const warnings = safeArray(record.warnings);
        let status = validStatus || (selectedIds.length ? "proposed" : "no_match");
        if (status === "proposed" && selectedIds.length === 0) {
          status = "no_match";
          warnings.push("Attached Memory Reuse proposal had proposed status without selected memory IDs; no memory IDs were invented.");
        }
        if (selectedIds.length > 0 && status !== "proposed") {
          status = "proposed";
          warnings.push("Attached Memory Reuse proposal included selected memory IDs; status is surfaced as proposed.");
        }
        if (
          selectedIds.length === 0 &&
          (safeArray(record.why_selected).length || safeArray(record.reuse_boundary).length)
        ) {
          warnings.push("Attached Memory Reuse rationale was ignored because no selected memory IDs were attached.");
        }
        const selectionGuidance = safeArray(record.selection_guidance);
        const taskSummary = nonEmptyText(
          record.task_summary || record.task_ref || preview?.work_next_action || card?.current_or_next_step || preview?.work_title || card?.work_title,
          "Work Contract task context."
        );
        const defaultSourceContext = preview?.constellation_context?.status === "attached" || card?.constellation_context?.status === "attached"
          ? "constellation_context"
          : "work_contract";
        const boundary = [...memoryReuseAttachmentBoundaryText(), ...safeArray(record.boundary_text)];
        return {
          proposal_type: "memory_reuse_attachment_proposal",
          status,
          task_summary: taskSummary,
          task_ref: nonEmptyText(record.task_ref || card?.work_id || preview?.work_id, ""),
          source_context: normalizeMemoryReuseSourceContext(record.source_context, defaultSourceContext),
          selected_memory_ids: selectedIds,
          selected_memory_count: selectedIds.length,
          why_selected: selectedIds.length ? safeArray(record.why_selected) : [],
          reuse_boundary: selectedIds.length ? safeArray(record.reuse_boundary) : [],
          selection_guidance: selectionGuidance.length
            ? selectionGuidance
            : status === "proposed"
              ? [
                  "Review selected persisted memory IDs and reuse boundaries before starting a separate Codex session.",
                  "Treat the attachment as prior context only, not runtime authority.",

              : status === "no_match"
                ? [
                    "No persisted perspective-memory items were selected from the attached Work Contract context.",
                    "Continue without reuse or run Perspective Memory Reuse Intake separately before starting Codex if memory context is required.",
                  ]
                : [
                    `Memory Reuse proposal data is ${status} in this Work Contract payload.`,
                    "No selected memory IDs were attached or invented.",
                  ],
          fallback_brief: nonEmptyText(record.fallback_brief, fallbackMemoryReuseBrief(status)),
          warnings,
          boundary_text: boundary,
        };
      }

      function memoryReuseProposalLineItems(proposal) {
        const selectedIds = safeArray(proposal?.selected_memory_ids);

          "- Selected memory IDs:",
          ...(selectedIds.length ? selectedIds.map((item) => `  - ${item}`) : ["  - No persisted memory IDs selected."]),

        if (whySelected.length) {
          lines.push("- Why selected:", ...whySelected.map((item) => `  - ${item}`));

        return lines;

        );
        return {
          packet_type: "core_codex_handoff_packet",

          ),
