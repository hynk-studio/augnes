          expected_files: safeArray(source.expected_files).length ? safeArray(source.expected_files) : safeArray(packet.expected_files),
          expected_checks: safeArray(source.expected_checks).length ? safeArray(source.expected_checks) : safeArray(packet.expected_checks),
          related_state_keys: safeArray(source.related_state_keys).length ? safeArray(source.related_state_keys) : safeArray(packet.related_state_keys),
          copyable_handoff_text: copyableText,
          copyable_core_handoff_text: copyableText,
        };
      }

      function normalizeFinalCodexHandoffPacket(data, preview, card) {
        const source = safeRecord(data?.final_codex_handoff_packet || data?.codex_final_handoff_packet);
        const context =
          normalizeWorkContractConstellationContext({
            ...data,
            work_contract_card: {
              ...(data?.work_contract_card || {}),
              constellation_context: source.constellation_context || preview.constellation_context || card.constellation_context,
            },
            constellation_context: source.constellation_context || data?.constellation_context,
          });
        const sourceSlots = safeRecord(source.handoff_automation_slots || data?.handoff_automation_slots);
        const sourceMemorySlot = safeRecord(sourceSlots.memory_reuse_attachment);
        const sourcePrBodySlot = safeRecord(sourceSlots.pr_body_checklist);
        const sourceResultReviewSlot = safeRecord(sourceSlots.codex_result_review_packet);
        const memoryReuseProposal = normalizeMemoryReuseAttachmentProposal(
          source.memory_reuse_attachment_proposal ||
            data?.memory_reuse_attachment_proposal ||
            data?.final_handoff_memory_reuse_attachment ||
            sourceMemorySlot.proposal,
          { ...preview, constellation_context: context.status === "attached" ? context : null },
          card
        );
        const prBodyChecklist = normalizePrBodyChecklistPreview(
          source.pr_body_checklist_preview ||
            source.codex_pr_body_checklist ||
            data?.pr_body_checklist_preview ||
            data?.codex_pr_body_checklist ||
            sourcePrBodySlot.checklist
        );
        const closeoutSkeleton = normalizeCloseoutSkeleton(
          source.codex_closeout_skeleton ||
            source.final_handoff_closeout_skeleton ||
            data?.codex_closeout_skeleton ||
            data?.final_handoff_closeout_skeleton ||
            sourcePrBodySlot.closeout_skeleton,
          { ...preview, constellation_context: context.status === "attached" ? context : null },
          memoryReuseProposal,
          context.status === "attached" ? context : null
        );
        const codexResultReviewPacket = normalizeCodexResultReviewPacket(
          source.codex_result_review_packet_preview ||
            source.final_handoff_codex_result_review_packet ||
            source.codex_pr_review_packet_preview ||
            data?.codex_result_review_packet_preview ||
            data?.final_handoff_codex_result_review_packet ||
            data?.codex_pr_review_packet_preview ||
            sourceResultReviewSlot.review_packet,
          {
            work_id: preview.work_id,
            expected_files: preview.expected_files,
            expected_checks: preview.expected_checks,
          }
        );
        const slots = fallbackHandoffAutomationSlots(sourceSlots, memoryReuseProposal, prBodyChecklist, closeoutSkeleton, codexResultReviewPacket);
        const fallbackPacket = {
          packet_type: "final_codex_handoff_packet",
          schema: "augnes.final_codex_handoff_packet.v0_1",
          title: "Final Codex Handoff Packet",
          composition_status: "composed",
          source_preview_type: "codex_handoff_preview",
          work_scope: preview.scope,
          work_id: preview.work_id,
          work_title: preview.work_title,
          work_status: preview.work_status,
          current_or_next_step: preview.work_next_action,
          expected_files: preview.expected_files,
          expected_checks: preview.expected_checks,
          related_state_keys: preview.related_state_keys,
          proof_evidence_expectation_summary: "Proof and evidence remain separate from approval.",
          skipped_check_policy: "Skipped checks must be reported with concrete reasons; do not claim skipped checks passed.",
          browser_verification_expectation: preview.browser_verification,
          forbidden_actions: preview.forbidden_actions,
          stop_conditions: preview.stop_conditions,
          authority_boundaries: preview.boundary_text,
          final_report_requirements: [
            "Changed files.",
            "Verification commands and results.",
            "Skipped checks with concrete reasons.",
            "Authority boundary statement.",
            "Remaining friction or next recommended step.",
          ],
          constellation_context: context.status === "attached" ? context : null,
          constellation_context_status: context.status === "attached" ? "attached" : "explicitly_absent",
          no_constellation_context_fallback: "No Project Constellation context is attached to this work contract.",
          memory_reuse_attachment_proposal: memoryReuseProposal,
          pr_body_checklist_preview: prBodyChecklist,
          codex_pr_body_checklist: prBodyChecklist,
          codex_closeout_skeleton: closeoutSkeleton,
          final_handoff_closeout_skeleton: closeoutSkeleton,
          codex_result_review_packet_preview: codexResultReviewPacket,
          final_handoff_codex_result_review_packet: codexResultReviewPacket,
          codex_pr_review_packet_preview: codexResultReviewPacket,
          structured_json_delimiters: {
            begin: "BEGIN_AUGNES_CODEX_HANDOFF_JSON",
            end: "END_AUGNES_CODEX_HANDOFF_JSON",
          },
          handoff_automation_slots: slots,
        };
        const packet = {
          ...fallbackPacket,
          ...source,
          handoff_automation_slots: slots,
          memory_reuse_attachment_proposal: memoryReuseProposal,
          pr_body_checklist_preview: prBodyChecklist,
          codex_pr_body_checklist: prBodyChecklist,
          codex_closeout_skeleton: closeoutSkeleton,
          final_handoff_closeout_skeleton: closeoutSkeleton,
          codex_result_review_packet_preview: codexResultReviewPacket,
          final_handoff_codex_result_review_packet: codexResultReviewPacket,
          codex_pr_review_packet_preview: codexResultReviewPacket,
          constellation_context: source.constellation_context || fallbackPacket.constellation_context,
        };
        const codexExecutionRequestPreview = normalizeCodexExecutionRequestPreview(
          source.codex_execution_request_preview ||
            source.execution_request_preview ||
            data?.codex_execution_request_preview ||
            data?.execution_request_preview ||
            data?.final_handoff_codex_execution_request_preview,
          packet
        );
        const packetWithText = {
          ...packet,
          codex_execution_request_preview: codexExecutionRequestPreview,
          execution_request_preview: codexExecutionRequestPreview,
          copyable_handoff_text: nonEmptyText(
            source.copyable_handoff_text,
            composeFallbackFinalHandoffText({ ...preview, constellation_context: context }, slots, memoryReuseProposal, prBodyChecklist, closeoutSkeleton, codexResultReviewPacket)
          ),
        };
        const corePacket = normalizeCoreCodexHandoffPacket(data, packetWithText);
        const codexHandoffDecision = normalizeCodexHandoffDecision(
          data?.codex_handoff_decision ||
            data?.codex_handoff_recommendation ||
            data?.external_codex_handoff_gate_preview ||
            source.codex_handoff_decision ||
            source.codex_handoff_recommendation,
          corePacket
        );
        return {
          ...packetWithText,
          codex_execution_request_preview: codexExecutionRequestPreview,
          execution_request_preview: codexExecutionRequestPreview,
          core_codex_handoff_packet: corePacket,
          codex_core_handoff_packet: corePacket,
          codex_handoff_decision: codexHandoffDecision,
          codex_handoff_recommendation: codexHandoffDecision,
          full_codex_handoff_packet: {
            packet_type: packetWithText.packet_type,
            schema: packetWithText.schema,
            title: packetWithText.title,
            copyable_handoff_text: packetWithText.copyable_handoff_text,
          },
          copyable_core_handoff_text: corePacket.copyable_handoff_text,
          copyable_full_handoff_text: packetWithText.copyable_handoff_text,
        };
      }

      function extractStructuredHandoffBlock(text) {
        const begin = "BEGIN_AUGNES_CODEX_HANDOFF_JSON";
        const end = "END_AUGNES_CODEX_HANDOFF_JSON";
        const beginIndex = text.indexOf(begin);
        const endIndex = text.indexOf(end);
        if (beginIndex === -1 || endIndex === -1 || endIndex <= beginIndex) {
          return { error: "Structured JSON block is missing or malformed." };
        }
        try {
          const value = JSON.parse(text.slice(beginIndex + begin.length, endIndex).trim());
          return value && typeof value === "object" && !Array.isArray(value)
            ? { value }
            : { error: "Structured JSON block must contain an object." };
        } catch (error) {
          return { error: error?.message || "Structured JSON block is malformed." };
        }
      }

      function containsForbiddenFinalHandoffLabel(text) {
        const labels = [
          ["Run", " ", "Codex"],
          ["Start", " ", "Codex"],
          ["Launch", " ", "Codex"],
          ["Send", " ", "to", " ", "Codex"],
          ["Commit", " ", "state"],
          ["Record", " ", "proof"],
          ["Record", " ", "evidence"],
          ["Approve", " ", "publication"],
          ["Publish", " ", "now"],
          ["Merge", " ", "PR"],
          ["Enable", " ", "auto-merge"],
          ["Re", "try"],
          ["Re", "play"],
          ["De", "ploy"],
          ["Post", " ", "externally"],
          ["Create", " ", "PR"],
          ["Open", " ", "PR"],
          ["Submit", " ", "review"],
          ["Request", " ", "changes"],
          ["Approve", " ", "PR"],
        ];
        return labels.some((parts) => text.includes(parts.join("")));
      }

      function memoryReuseAttachmentPreflightCheck(packet, text) {
        const proposal = normalizeMemoryReuseAttachmentProposal(
          packet.memory_reuse_attachment_proposal || packet.handoff_automation_slots?.memory_reuse_attachment?.proposal,
          { work_next_action: packet.current_or_next_step, work_title: packet.work_title, work_id: packet.work_id },
          { work_id: packet.work_id, work_title: packet.work_title, current_or_next_step: packet.current_or_next_step }
        );
        const selectedIds = safeArray(proposal.selected_memory_ids);
        const fallbackBriefPresent = Boolean(nonEmptyText(proposal.fallback_brief, ""));
        const packetMentionsAttachment = text.includes("Memory Reuse attachment");
        if (proposal.status === "proposed") {
          const proposedValid =
            selectedIds.length > 0 &&
            selectedIds.length === Number(proposal.selected_memory_count || 0) &&
            safeArray(proposal.why_selected).length > 0 &&
            safeArray(proposal.reuse_boundary).length > 0 &&
            packetMentionsAttachment;
          return {
            id: "memory_reuse_attachment_state",
            status: proposedValid ? "pass" : "fail",
            message: proposedValid
              ? "Memory Reuse attachment proposal includes selected memory IDs with reuse rationale and boundaries."
              : "Memory Reuse attachment proposal is marked proposed but selected IDs, rationale, boundaries, or packet text are incomplete.",
          };
        }
        if (proposal.status === "no_match") {
          const noMatchValid =
            selectedIds.length === 0 &&
            Number(proposal.selected_memory_count || 0) === 0 &&
            safeArray(proposal.why_selected).length === 0 &&
            safeArray(proposal.reuse_boundary).length === 0 &&
            fallbackBriefPresent &&
            packetMentionsAttachment;
          return {
            id: "memory_reuse_attachment_state",
            status: noMatchValid ? "pass" : "fail",
            message: noMatchValid
              ? "Memory Reuse attachment is explicit no_match with no invented selected memory data."
              : "Memory Reuse attachment no_match state is missing fallback text or includes invented selected memory data.",
          };
        }
        if (proposal.status === "not_configured" || proposal.status === "unavailable") {
          return {
            id: "memory_reuse_attachment_state",
            status: fallbackBriefPresent && packetMentionsAttachment ? "warn" : "fail",
            message:
              fallbackBriefPresent && packetMentionsAttachment
                ? `Memory Reuse attachment is explicitly ${proposal.status}.`
                : "Memory Reuse attachment unavailable/not_configured state is missing explicit fallback text.",
          };
        }
        return {
          id: "memory_reuse_attachment_state",
          status: "fail",
          message: "Memory Reuse attachment state is malformed or ambiguous.",
        };
      }

      function prBodyChecklistPreflightCheck(packet, text) {
        const checklist = normalizePrBodyChecklistPreview(
          packet.pr_body_checklist_preview ||
            packet.codex_pr_body_checklist ||
            packet.handoff_automation_slots?.pr_body_checklist?.checklist
        );
        const skeleton = normalizeCloseoutSkeleton(
          packet.codex_closeout_skeleton ||
            packet.final_handoff_closeout_skeleton ||
            packet.handoff_automation_slots?.pr_body_checklist?.closeout_skeleton,
          {
            expected_files: packet.expected_files,
            expected_checks: packet.expected_checks,
            work_title: packet.work_title,
            boundary_text: packet.authority_boundaries,
          },
          packet.memory_reuse_attachment_proposal,
          packet.constellation_context
        );
        const slot = safeRecord(packet.handoff_automation_slots?.pr_body_checklist);
        if (slot.status === "not_generated" && slot.inert !== false) {
          return {
            id: "pr_body_checklist_state",
            status: "warn",
            message: "PR body checklist slot is explicitly inert and not generated.",
          };
        }
        const skeletonText = nonEmptyText(skeleton.copyable_closeout_text, "");
        const requiredSectionsPresent = prBodyChecklistRequiredSections().every(
          (section) => safeArray(checklist.required_sections).includes(section) && skeletonText.includes(`## ${section}`)
        );
        const valid =
          checklist.status === "preview_only" &&
          checklist.generated === true &&
          skeleton.status === "preview_only" &&
          skeleton.generated === true &&
          requiredSectionsPresent &&
          skeletonText.includes("Placeholder:") &&
          text.includes("Codex PR body checklist / closeout skeleton") &&
          slot.status === "preview_only" &&
          slot.generated === true &&
          slot.inert !== false &&
          !/all passed\.|verification passed|all checks passed/i.test(skeletonText);
        return {
          id: "pr_body_checklist_state",
          status: valid ? "pass" : "fail",
          message: valid
            ? "Preview-only PR body checklist and closeout skeleton are present with placeholders and no pass claims."
            : "PR body checklist or closeout skeleton is missing, ambiguous, or claims results prematurely.",
        };
      }

      function codexResultReviewPacketPreflightCheck(packet, text) {
        const reviewPacket = normalizeCodexResultReviewPacket(
          packet.codex_result_review_packet_preview ||
            packet.final_handoff_codex_result_review_packet ||
            packet.codex_pr_review_packet_preview ||
            packet.handoff_automation_slots?.codex_result_review_packet?.review_packet,
          packet
        );
        const slot = safeRecord(packet.handoff_automation_slots?.codex_result_review_packet);
        const explicitMissing =
          (reviewPacket.status === "needs_result_input" || reviewPacket.status === "not_provided") &&
          reviewPacket.result_source === "not_provided" &&
          safeArray(reviewPacket.required_result_input_fields).length > 0 &&
          safeArray(reviewPacket.reported_changed_files).length === 0 &&
          safeArray(reviewPacket.reported_verification_results).length === 0 &&
          text.includes("Codex result review packet") &&
          slot.generated === true &&
          slot.inert !== false;
        if (reviewPacket.status === "needs_result_input" || reviewPacket.status === "not_provided") {
          return {
            id: "codex_result_review_packet_state",
            status: explicitMissing ? "warn" : "fail",
            message: explicitMissing
              ? "Codex result review packet explicitly needs result input and does not invent reported result data."
              : "Codex result review packet missing-result state is malformed or ambiguous.",
          };
        }
        if (reviewPacket.status === "preview_ready") {
          const ready =
            reviewPacket.result_source !== "not_provided" &&
            safeArray(reviewPacket.reported_changed_files).length > 0 &&
            safeArray(reviewPacket.reported_verification_results).length > 0 &&
            reviewPacket.review_recommendation !== "needs_result_input" &&
            text.includes("Codex result review packet") &&
            slot.generated === true &&
            slot.inert !== false;
          return {
            id: "codex_result_review_packet_state",
            status: ready ? "pass" : "fail",
            message: ready
              ? "Codex result review packet has attached result payload for bounded human review."
              : "Codex result review packet is preview_ready but lacks reported files, verification results, or bounded recommendation.",
          };
        }
        return {
          id: "codex_result_review_packet_state",
          status: reviewPacket.status === "unavailable" && safeArray(reviewPacket.boundary_text).length ? "warn" : "fail",
          message: reviewPacket.status === "unavailable" ? "Codex result review packet is explicitly unavailable." : "Codex result review packet state is malformed or ambiguous.",
        };
      }

      function localFinalPreflight(packet) {
        const text = nonEmptyText(packet.copyable_handoff_text, "");
        const block = extractStructuredHandoffBlock(text);
        const checks = [
          {
            id: "packet_text",
            status: text ? "pass" : "fail",
            message: text ? "Final handoff packet text exists." : "Final handoff packet text is missing.",
          },
          {
            id: "work_id_or_fallback",
            status: packet.work_id || text.includes("No work ID listed.") ? "pass" : "fail",
            message: packet.work_id ? "Work ID is present." : "Missing work ID fallback is explicit.",
          },
          {
            id: "authority_boundary",
            status: safeArray(packet.authority_boundaries).length ? "pass" : "fail",
            message: safeArray(packet.authority_boundaries).length ? "Authority boundary text exists." : "Authority boundary text is missing.",
          },
          {
            id: "forbidden_actions",
            status: safeArray(packet.forbidden_actions).length ? "pass" : "fail",
            message: safeArray(packet.forbidden_actions).length ? "Forbidden action boundaries exist." : "Forbidden action boundaries are missing.",
          },
          {
            id: "skipped_check_policy",
            status: nonEmptyText(packet.skipped_check_policy, "") ? "pass" : "fail",
            message: nonEmptyText(packet.skipped_check_policy, "") ? "Skipped check policy exists." : "Skipped check policy is missing.",
          },
          {
            id: "final_report_requirements",
            status: safeArray(packet.final_report_requirements).length ? "pass" : "fail",
            message: safeArray(packet.final_report_requirements).length ? "Final report expectations exist." : "Final report expectations are missing.",
          },
          {
            id: "constellation_context_state",
            status:
              packet.constellation_context_status === "attached" ||
              text.includes("No Project Constellation context is attached to this work contract.")
                ? "pass"
                : "fail",
            message:
              packet.constellation_context_status === "attached"
                ? "Project Constellation context is attached."
                : "Missing Project Constellation context fallback is explicit.",
          },
          memoryReuseAttachmentPreflightCheck(packet, text),
          prBodyChecklistPreflightCheck(packet, text),
          codexResultReviewPacketPreflightCheck(packet, text),
          {
            id: "no_forbidden_control_labels",
            status: containsForbiddenFinalHandoffLabel(text) ? "fail" : "pass",
            message: containsForbiddenFinalHandoffLabel(text)
              ? "A forbidden execution/write control label is present."
              : "No execution/write control labels are present.",
          },
          {
            id: "structured_json_block",
            status: block.value ? "pass" : "fail",
            message: block.value ? "Structured JSON block is present and parseable." : block.error,
          },
        ];
        const hasFail = checks.some((check) => check.status === "fail");
        const hasWarn = checks.some((check) => check.status === "warn");
        const status = hasFail ? "fail" : hasWarn ? "warn" : "pass";
        return {
          preflight_type: "final_handoff_preflight",
          status,
          summary:
            status === "pass"
              ? "Final handoff packet passes local read-only preflight."
              : status === "warn"
                ? "Final handoff packet has local preflight warnings."
                : "Final handoff packet failed local preflight.",
          checks,
          checked_packet_type: "final_codex_handoff_packet",
          checker: "app_local_final_handoff_preview_checker",
          local_only: true,
          pure: true,
          did_not_spawn_shell_or_npm: true,
          did_not_call_runtime: true,
          did_not_call_github_openai_or_provider: true,
          did_not_record_proof_or_evidence: true,
          did_not_execute_codex: true,
        };
      }

      function normalizeFinalHandoffPreflight(data, packet) {
        const source = safeRecord(data?.final_handoff_preflight);
        const checks = safeRecordArray(source.checks);
        if (source.status && checks.length) {
          return {
            preflight_type: nonEmptyText(source.preflight_type, "final_handoff_preflight"),
            status: nonEmptyText(source.status, "unavailable"),
            summary: nonEmptyText(source.summary, "Final handoff preflight status is unavailable."),
            checks,
            checked_packet_type: nonEmptyText(source.checked_packet_type, "final_codex_handoff_packet"),
            checker: nonEmptyText(source.checker, "app_local_final_handoff_preview_checker"),
            local_only: source.local_only !== false,
            pure: source.pure !== false,
            did_not_spawn_shell_or_npm: source.did_not_spawn_shell_or_npm !== false,
            did_not_call_runtime: source.did_not_call_runtime !== false,
            did_not_call_github_openai_or_provider: source.did_not_call_github_openai_or_provider !== false,
            did_not_record_proof_or_evidence: source.did_not_record_proof_or_evidence !== false,
            did_not_execute_codex: source.did_not_execute_codex !== false,
          };
        }
        return localFinalPreflight(packet);
      }

      function derivePostRunResultReviewReadiness(reviewPacket) {
        if (reviewPacket.status === "preview_ready") {
          return nonEmptyText(reviewPacket.review_recommendation, "ready_for_human_review");
        }
        if (reviewPacket.status === "needs_result_input" || reviewPacket.status === "not_provided") {
          return "needs_result_input";
        }
        return "unavailable";
      }

      function normalizeFinalHandoffReadinessSummary(source, packet, preflight) {
        const record = safeRecord(source);
        const reviewPacket = normalizeCodexResultReviewPacket(
          packet?.codex_result_review_packet_preview ||
            packet?.final_handoff_codex_result_review_packet ||
            packet?.codex_pr_review_packet_preview ||
            packet?.handoff_automation_slots?.codex_result_review_packet?.review_packet,
          packet
        );
        const preflightChecks = safeRecordArray(preflight?.checks);
        const preRunChecks = preflightChecks.filter((check) => nonEmptyText(check.id, "") !== "codex_result_review_packet_state");
        const hasPreRunFail = preRunChecks.some((check) => {
          const status = nonEmptyText(check.status, "unavailable");
          return status === "fail" || status === "unavailable";
        });
        const hasPreRunWarn = preRunChecks.some((check) => nonEmptyText(check.status, "") === "warn");
        const fallbackPreRunReadiness =
          nonEmptyText(preflight?.status, "unavailable") === "unavailable"
            ? "unavailable"
            : hasPreRunFail
              ? "blocked"
              : hasPreRunWarn
                ? "needs_attention"
                : "ready";
        const fallbackPostRunReadiness = derivePostRunResultReviewReadiness(reviewPacket);
        const fallbackExplanation =
          fallbackPreRunReadiness === "ready" && fallbackPostRunReadiness === "needs_result_input"
            ? "Result review is waiting for a Codex final report or structured result payload. This does not mean the pre-run handoff packet is broken."
            : fallbackPostRunReadiness === "ready_for_human_review"
              ? "Post-run result review has input and is ready for human review; keep the overall local preflight status visible for any remaining warnings."
              : fallbackPreRunReadiness === "blocked"
                ? "Pre-run handoff preparation has a blocking local preflight finding; fix that before using the packet."
                : fallbackPreRunReadiness === "needs_attention"
                  ? "Pre-run handoff preparation has local preflight warnings that should be reviewed before using the packet."
                  : "Readiness summary separates handoff preparation from post-run result review input while preserving the overall local preflight status.";

        return {
          summary_type: "final_handoff_readiness_summary",
          pre_run_handoff_readiness: nonEmptyText(record.pre_run_handoff_readiness, fallbackPreRunReadiness),
          post_run_result_review_readiness: nonEmptyText(record.post_run_result_review_readiness, fallbackPostRunReadiness),
          overall_local_preflight_status: nonEmptyText(record.overall_local_preflight_status, nonEmptyText(preflight?.status, "unavailable")),
          result_review_status: nonEmptyText(record.result_review_status, reviewPacket.status),
          result_review_source: nonEmptyText(record.result_review_source, reviewPacket.result_source),
          explanation: nonEmptyText(record.explanation, fallbackExplanation),
          pre_run_check_ids: safeArray(record.pre_run_check_ids).length
            ? safeArray(record.pre_run_check_ids)
            : preRunChecks.map((check) => nonEmptyText(check.id, "check")),
          post_run_check_id: nonEmptyText(record.post_run_check_id, "codex_result_review_packet_state"),
          boundary_text: safeArray(record.boundary_text).length
            ? safeArray(record.boundary_text)
            : [
                "Final handoff readiness summary is display-only status clarification.",
                "It separates pre-run handoff preparation from post-run result review input.",
                "It does not change local preflight semantics or grant execution, write, GitHub, provider, proof, evidence, state, publish, retry, replay, deploy, or merge authority.",
              ],
        };
      }

      function codexExecutionRequestConfirmationFields() {
        return [
          "current_runtime_endpoint",
          "confirmed_scope",
          "confirmed_work_id",
          "explicit_user_request_for_separate_codex_session",
          "expected_files_reviewed",
          "expected_checks_reviewed",
          "project_constellation_context_reviewed",
          "memory_reuse_status_reviewed",
          "authority_boundary_reviewed",
          "branch_and_pr_authority_confirmed_separately",
          "proof_and_evidence_recording_authority_confirmed_separately",
          "result_review_packet_return_expected",
        ];
      }

      function codexExecutionRequestNonAuthorities() {
        return [
          "no Codex execution",
          "no shell spawn",
          "no Node process spawning",
          "no branch creation",
          "no PR creation",
          "no GitHub calls",
          "no proof writes",
          "no evidence writes",
          "no Augnes state mutation",
          "no DB writes",
          "no provider calls",
          "no OpenAI calls",
          "no persistence",
          "no approval, merge, publish, retry, replay, or deploy authority",
        ];
      }

      function normalizeCodexExecutionRequestPreview(source, packet) {
        const record = safeRecord(source);
        const allowedStatuses = ["preview_only", "awaiting_user_confirmation", "unavailable"];
        const sourcePacket = safeRecord(record.source_final_handoff_packet);
        const packetRef = nonEmptyText(
          sourcePacket.packet_ref,
          packet?.work_id ? `final_codex_handoff_packet:${packet.work_id}` : "final_codex_handoff_packet:missing_work_id"
        );
        const sourceStatus = nonEmptyText(record.status, "");
        const confirmationStatus = nonEmptyText(record.confirmation_status, "");
        const status = allowedStatuses.includes(sourceStatus) ? sourceStatus : packet ? "preview_only" : "unavailable";
        const nextConfirmationStatus = allowedStatuses.includes(confirmationStatus)
          ? confirmationStatus
          : status === "unavailable"
            ? "unavailable"
            : "awaiting_user_confirmation";
        const expectedFiles = safeArray(record.expected_files).length ? safeArray(record.expected_files) : safeArray(packet?.expected_files);
        const expectedChecks = safeArray(record.expected_checks).length ? safeArray(record.expected_checks) : safeArray(packet?.expected_checks);
        const resultReviewPacket = normalizeCodexResultReviewPacket(
          packet?.codex_result_review_packet_preview ||
            packet?.final_handoff_codex_result_review_packet ||
            packet?.codex_pr_review_packet_preview ||
            packet?.handoff_automation_slots?.codex_result_review_packet?.review_packet,
          packet || {}
        );
        return {
          preview_type: nonEmptyText(record.preview_type, "codex_execution_request_preview"),
          status,
          confirmation_status: nextConfirmationStatus,
          source_final_handoff_packet: {
            packet_type: nonEmptyText(sourcePacket.packet_type, "final_codex_handoff_packet"),
            schema: nonEmptyText(sourcePacket.schema, "augnes.final_codex_handoff_packet.v0_1"),
            packet_ref: packetRef,
            composition_status: nonEmptyText(sourcePacket.composition_status, nonEmptyText(packet?.composition_status, "composed")),
            copyable_handoff_text_unchanged: sourcePacket.copyable_handoff_text_unchanged !== false,
          },
          work_id: nonEmptyText(record.work_id, nonEmptyText(packet?.work_id, "")),
          scope: nonEmptyText(record.scope, nonEmptyText(packet?.work_scope, "")),
          selected_constellation_context_status: nonEmptyText(
            record.selected_constellation_context_status,
            nonEmptyText(packet?.constellation_context_status, "explicitly_absent")
          ),
          memory_reuse_status: nonEmptyText(
            record.memory_reuse_status,
            nonEmptyText(packet?.memory_reuse_attachment_proposal?.status || packet?.handoff_automation_slots?.memory_reuse_attachment?.status, "no_match")
          ),
          expected_files: expectedFiles,
          expected_checks: expectedChecks,
          pr_body_checklist_present:
            record.pr_body_checklist_present === false
              ? false
              : Boolean(packet?.pr_body_checklist_preview || packet?.codex_pr_body_checklist || packet?.handoff_automation_slots?.pr_body_checklist?.checklist),
          closeout_skeleton_present:
            record.closeout_skeleton_present === false
              ? false
              : Boolean(packet?.codex_closeout_skeleton || packet?.final_handoff_closeout_skeleton || packet?.handoff_automation_slots?.pr_body_checklist?.closeout_skeleton),
          result_review_packet_expected_after_run: record.result_review_packet_expected_after_run !== false,
          result_review_packet_status_before_run: nonEmptyText(record.result_review_packet_status_before_run, resultReviewPacket.status),
          required_user_confirmation_fields: safeArray(record.required_user_confirmation_fields).length
            ? safeArray(record.required_user_confirmation_fields)
            : codexExecutionRequestConfirmationFields(),
          non_authorities: safeArray(record.non_authorities).length
            ? safeArray(record.non_authorities)
            : codexExecutionRequestNonAuthorities(),
          boundary_text: safeArray(record.boundary_text).length
            ? safeArray(record.boundary_text)
            : [
                "This preview does not execute Codex. It only prepares the request shape for later explicit user-confirmed execution.",
                "It is not an execution button, branch creator, PR creator, proof recorder, evidence recorder, state mutation, provider call, or GitHub call.",
                "Any later Codex work still requires an explicit user-started Codex session and separate confirmation of write or recording authority.",
              ],
        };
      }

      function safeObject(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function safeObjectArray(value) {
        return Array.isArray(value) ? value.filter((item) => item && typeof item === "object") : [];
      }

      function normalizeProjectConstellationPreview(data) {
        const preview = safeObject(data?.project_constellation_preview);
        const project = safeObject(preview.project_constellation || data?.project_constellation);
        const copySeed = safeObject(preview.copyable_handoff_seed || data?.copyable_handoff_seed);
        const selection = safeObject(preview.selection || data?.selection || copySeed.selection);
        const fallbackText = nonEmptyText(preview.fallback_text, "");
        const evidencePointers = safeObjectArray(preview.evidence_pointers || data?.evidence_pointers || project.evidence_pointers);
        const unresolvedTensions = safeObjectArray(preview.unresolved_tensions || data?.unresolved_tensions || project.unresolved_tensions);
        const nextActionCandidates = safeObjectArray(preview.next_action_candidates || data?.next_action_candidates || project.next_action_candidates);
        const nodes = safeObjectArray(project.nodes);
        const edges = safeObjectArray(project.edges);
        const clusters = safeObjectArray(project.clusters);
        const missingDataFallbacks = safeArray(preview.missing_data_fallbacks || data?.missing_data_fallbacks);
        const requestedCandidateId = nonEmptyText(
          selection.requested_candidate_id || preview.requested_candidate_id || data?.requested_candidate_id || copySeed.requested_candidate_id,
          ""
        );
        const selectedCandidateId = nonEmptyText(
          selection.selected_candidate_id || preview.selected_candidate_id || data?.selected_candidate_id || copySeed.selected_candidate_id,
          ""
        );
        const selectedCandidateLabel = nonEmptyText(
          selection.selected_candidate_label || preview.selected_candidate_label || data?.selected_candidate_label || copySeed.selected_candidate_label,
          selectedCandidateId ? "Selected advisory next action" : ""
        );
        const selectionStatus = nonEmptyText(
          selection.selection_status || preview.selection_status || data?.selection_status || copySeed.selection_status,
          fallbackText || !nextActionCandidates.length ? "unavailable" : "defaulted"
        );
        const selectionFallbackReason = nonEmptyText(
          selection.selection_fallback_reason || preview.selection_fallback_reason || data?.selection_fallback_reason || copySeed.selection_fallback_reason,
          ""
        );
        const boundaryText = safeArray(copySeed.boundary_text).length
          ? safeArray(copySeed.boundary_text)
          : [
              "This preview is read-only.",
              "This preview cannot execute Codex.",
              "This preview cannot record proof or evidence.",
              "This preview cannot commit or reject Augnes state.",
              "This preview cannot create branches or PRs.",
              "This preview cannot approve, publish, retry, replay, externally post, merge, deploy, or enable auto-merge.",
              "Evidence pointers are pointer-only.",
              "Next action candidates are advisory.",
              "A copied handoff seed is manual preview text only.",
              "Durable approval remains user/Core gated.",
            ];

        return {
          title: nonEmptyText(preview.title, "Project Constellation Preview"),
          scope: nonEmptyText(preview.scope, "project:augnes"),
          status: nonEmptyText(preview.status, fallbackText ? "unavailable" : "available"),
          fallback_text: fallbackText,
          project_constellation: {
            constellation_id: nonEmptyText(project.constellation_id, "No constellation ID returned."),
            boundary_class: nonEmptyText(project.boundary_class, "read_only_local_static_preview"),
            thesis: nonEmptyText(project.thesis, fallbackText || "No Project Constellation thesis was returned."),
            nodes,
            edges,
            clusters,
          },
          evidence_pointers: evidencePointers,
          unresolved_tensions: unresolvedTensions,
          next_action_candidates: nextActionCandidates,
          source_refs: safeObjectArray(preview.source_refs || data?.source_refs),
          requested_candidate_id: requestedCandidateId,
          selected_candidate_id: selectedCandidateId,
          selected_candidate_label: selectedCandidateLabel,
          selection_status: selectionStatus,
          selection_fallback_reason: selectionFallbackReason,
          selection: {
            requested_candidate_id: requestedCandidateId,
            selected_candidate_id: selectedCandidateId,
            selected_candidate_label: selectedCandidateLabel,
            selection_status: selectionStatus,
            selection_fallback_reason: selectionFallbackReason,
          },
          copyable_handoff_seed: {
            status: nonEmptyText(copySeed.status, fallbackText ? "unavailable" : "available"),
            requested_candidate_id: requestedCandidateId,
            selected_candidate_id: selectedCandidateId,
            selected_candidate_label: selectedCandidateLabel,
            selection_status: selectionStatus,
            selection_fallback_reason: selectionFallbackReason,
            selection: {
              requested_candidate_id: requestedCandidateId,
              selected_candidate_id: selectedCandidateId,
              selected_candidate_label: selectedCandidateLabel,
              selection_status: selectionStatus,
              selection_fallback_reason: selectionFallbackReason,
            },
            preview_text: nonEmptyText(
              copySeed.preview_text,
              [
                "Augnes Project Constellation handoff seed",
                "No Project Constellation route payload was returned. This fallback does not invent missing context and does not execute Codex.",
              ].join("\n")
            ),
            source_refs: safeArray(copySeed.source_refs),
            required_checks: safeArray(copySeed.required_checks),
            skipped_check_policy: nonEmptyText(copySeed.skipped_check_policy, "Report every skipped check with a concrete reason."),
            final_report_requirements: safeArray(copySeed.final_report_requirements),
            boundary_text: boundaryText,
          },
          missing_data_fallbacks: missingDataFallbacks,
        };
      }

      function listForConstellationHandoff(items, fallback) {
        const values = Array.isArray(items) ? items.filter((item) => typeof item === "string" && item.trim()) : [];

        return `${nonEmptyText(action.candidate_id, "unknown")}: ${nonEmptyText(action.summary, "No advisory next action summary returned.")}`;

      function sourceRefLabel(sourceRef) {
        if (typeof sourceRef === "string") return sourceRef;
        if (!sourceRef || typeof sourceRef !== "object") return "";
        return nonEmptyText(sourceRef.source_ref || sourceRef.target_ref || sourceRef.label || sourceRef.id, "");

      function buildConstellationHandoffSeedText(preview, candidate, selection) {
        const project = preview.project_constellation;
        const seed = preview.copyable_handoff_seed;
        if (preview.fallback_text || !candidate) {
          return nonEmptyText(seed.preview_text, [
            "Augnes Project Constellation handoff seed",
            "No Project Constellation route payload was returned. This fallback does not invent missing context and does not execute Codex.",
          ].join("\n"));
        }

        const sourceRefs = safeArray(seed.source_refs).length
          ? safeArray(seed.source_refs)
          : safeObjectArray(preview.source_refs).map(sourceRefLabel).filter(Boolean);
        const fallbackReason = nonEmptyText(selection.selection_fallback_reason, "");

        return [
          "Augnes Project Constellation handoff seed",
          "This is manual preview text for a separate user-started Codex task. It does not execute Codex.",
          "",
          "Repository",
          "- hynk-studio/augnes",
          "- Base: main",
          `- Scope: ${preview.scope}`,
          "",
          "Project thesis",
          project.thesis,
          "",
          "Selected/default advisory next action",
          `- ${summarizeConstellationNextAction(candidate)}`,
          "",
          "Selection status",
          `- Status: ${selection.selection_status}`,
          `- Requested candidate: ${selection.requested_candidate_id || "none"}`,
          `- Selected candidate: ${selection.selected_candidate_id || "none"}`,
          fallbackReason ? `- Fallback: ${fallbackReason}` : "- Fallback: none",
          "",
          "Bounded node summaries",
          listForConstellationHandoff(
            project.nodes.map((node) => `${nonEmptyText(node.id, "unknown")}: ${nonEmptyText(node.label, "Node")} - ${nonEmptyText(node.summary, "No node summary returned.")}`),
            "No node summaries were returned."
          ),
          "",
          "Bounded edge summaries",
          listForConstellationHandoff(
            project.edges.map((edge) => `${nonEmptyText(edge.id, "unknown")}: ${nonEmptyText(edge.source, "unknown")} -> ${nonEmptyText(edge.target, "unknown")} - ${nonEmptyText(edge.summary, "No edge summary returned.")}`),
            "No edge summaries were returned."
          ),
          "",
          "Bounded cluster summaries",
          listForConstellationHandoff(
            project.clusters.map((cluster) => `${nonEmptyText(cluster.id, "unknown")}: ${nonEmptyText(cluster.label, "Cluster")} - ${nonEmptyText(cluster.cluster_thesis, "No cluster thesis returned.")}`),
            "No cluster summaries were returned."
          ),
          "",
          "Pointer-only evidence refs",
          listForConstellationHandoff(preview.evidence_pointers.map(summarizeConstellationEvidencePointer), "No evidence pointers were returned."),
          "",
          "Unresolved tensions",
          listForConstellationHandoff(preview.unresolved_tensions.map(summarizeConstellationTension), "No unresolved tensions were returned."),
          "",
          "Required checks",
          listForConstellationHandoff(seed.required_checks, "No required checks listed."),
          "",
          "Skipped check policy",
          `- ${seed.skipped_check_policy}`,
          "",
          "Final report requirements",
          listForConstellationHandoff(seed.final_report_requirements, "No final report requirements listed."),
          "",
          "Authority boundaries",
          listForConstellationHandoff(seed.boundary_text, "No boundary text listed."),
          "",
          "Source refs",
          listForConstellationHandoff(sourceRefs, "No source refs were returned."),
        ].join("\n");
      }

      function buildConstellationHandoffSeedForCandidate(preview, candidate, selectionStatus = "selected") {
        const candidateId = nonEmptyText(candidate?.candidate_id, "");
        const candidateLabel = nonEmptyText(candidate?.label, "");
        const selection = {
          requested_candidate_id: candidateId,
          selected_candidate_id: candidateId,
          selected_candidate_label: candidateLabel,
          selection_status: selectionStatus,
          selection_fallback_reason: "",
        };
        return {
          ...preview.copyable_handoff_seed,
          status: preview.fallback_text ? "unavailable" : "available",
          requested_candidate_id: selection.requested_candidate_id,
          selected_candidate_id: selection.selected_candidate_id,
          selected_candidate_label: selection.selected_candidate_label,
          selection_status: selection.selection_status,
          selection_fallback_reason: selection.selection_fallback_reason,
          selection,
          preview_text: buildConstellationHandoffSeedText(preview, candidate, selection),
        };
      }

      function createConstellationNextActionCard(item, selectionController) {
        const isSelected = selectionController?.isSelected(item) === true;
        const card = el("div", { className: isSelected ? "item selected-item" : "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.candidate_id, "Advisory next action")) }));
        const stateTag = tag(isSelected ? "selected" : "advisory");
        titleRow.appendChild(stateTag);
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${nonEmptyText(item.candidate_id, "unknown")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.summary, "No advisory next action summary returned.") }));
        if (selectionController) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "handoff-use-button";
          button.textContent = "Use for handoff";
          button.setAttribute("aria-pressed", isSelected ? "true" : "false");
          button.addEventListener("click", () => selectionController.select(item));
          card.appendChild(button);
          selectionController.register({
            candidate_id: nonEmptyText(item.candidate_id, ""),
            card,
            button,
            stateTag,
          });
        }
        return card;
      }

      function renderCopyableConstellationHandoff(seed) {
        const root = el("div", { className: "stack" });
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The handoff seed is manual preview text; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, create branches or PRs, merge, or publish.",
        });
        status.setAttribute("aria-live", "polite");
        const copyRow = el("div", { className: "copy-row" });
        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.textContent = "Copy Handoff Preview";
        const pre = createPreBlock(seed.preview_text);
        copyButton.addEventListener("click", async () => {
          if (await copyTextToClipboard(seed.preview_text)) {
            status.textContent = "Handoff preview copied.";
          } else if (selectElementText(pre)) {
            status.textContent = "Clipboard blocked by this host. Preview text selected; press Command+C to copy.";
          } else {
            status.textContent = "Copy unavailable. Select and copy the preview text manually.";
          }
        });
        copyRow.appendChild(copyButton);
        root.append(status, copyRow, pre);
        return root;
      }

      function renderProjectConstellationPreview(data) {
        const preview = normalizeProjectConstellationPreview(data);
        const project = preview.project_constellation;
        const root = el("div", { className: "stack" });
        const defaultCandidate = preview.next_action_candidates.find(
          (candidate) => nonEmptyText(candidate.candidate_id, "") === preview.copyable_handoff_seed.selected_candidate_id
        ) || preview.next_action_candidates[0] || null;
        let selectedCandidateId = preview.copyable_handoff_seed.selected_candidate_id || nonEmptyText(defaultCandidate?.candidate_id, "");
        let currentHandoffSeed = preview.copyable_handoff_seed;
        const seedHost = el("div", { className: "stack" });
        const actionCardRefs = [];
        const renderSeed = () => {
          seedHost.replaceChildren(renderCopyableConstellationHandoff(currentHandoffSeed));
        };
        const updateActionCardStates = () => {
          actionCardRefs.forEach((ref) => {
            const isSelected = ref.candidate_id === selectedCandidateId;
            ref.card.className = isSelected ? "item selected-item" : "item";
            ref.button.setAttribute("aria-pressed", isSelected ? "true" : "false");
            ref.stateTag.textContent = isSelected ? "selected" : "advisory";
          });
        };
        const selectionController = {
          isSelected(candidate) {
            return nonEmptyText(candidate.candidate_id, "") === selectedCandidateId;
          },
          select(candidate) {
            const candidateId = nonEmptyText(candidate.candidate_id, "");
            if (!candidateId) return;
            selectedCandidateId = candidateId;
            currentHandoffSeed = buildConstellationHandoffSeedForCandidate(preview, candidate, "selected");
            renderSeed();
            updateActionCardStates();
          },
          register(ref) {
            actionCardRefs.push(ref);
          },
        };
        renderSeed();

        root.appendChild(createMetricGrid([
          ["Scope", preview.scope],
          ["Status", preview.status],
          ["Boundary", project.boundary_class],
          ["Nodes", safeCount(project.nodes.length)],
          ["Edges", safeCount(project.edges.length)],
          ["Clusters", safeCount(project.clusters.length)],
          ["Evidence refs", safeCount(preview.evidence_pointers.length)],
          ["Next actions", safeCount(preview.next_action_candidates.length)],
        ]));
        root.appendChild(el("p", { className: "summary", text: project.thesis }));
        if (preview.fallback_text) {
          root.appendChild(el("div", { className: "status-box error-box", text: preview.fallback_text }));
        }
        root.appendChild(createSection("Nodes", createList(project.nodes, createConstellationNodeCard), { badge: `${project.nodes.length}` }));
        root.appendChild(createSection("Edges", createList(project.edges, createConstellationEdgeCard), { badge: `${project.edges.length}` }));
        root.appendChild(createSection("Clusters", createList(project.clusters, createConstellationClusterCard), { badge: `${project.clusters.length}` }));
        root.appendChild(createSection("Pointer-only evidence refs", createList(preview.evidence_pointers, createConstellationEvidenceCard), { badge: `${preview.evidence_pointers.length}` }));
        root.appendChild(createSection("Unresolved tensions", createList(preview.unresolved_tensions, createConstellationTensionCard), { badge: `${preview.unresolved_tensions.length}` }));
        root.appendChild(createSection("Advisory next action candidates", createList(preview.next_action_candidates, (candidate) => createConstellationNextActionCard(candidate, selectionController)), { badge: `${preview.next_action_candidates.length}` }));
        root.appendChild(createSection("Copyable handoff seed", seedHost, { badge: preview.copyable_handoff_seed.status }));
        root.appendChild(createSection("Missing data fallbacks", createTextList(preview.missing_data_fallbacks), { badge: `${preview.missing_data_fallbacks.length}`, open: preview.missing_data_fallbacks.length > 0 }));
        root.appendChild(createSection("Preview boundary", createTextList(preview.copyable_handoff_seed.boundary_text), { badge: "read-only" }));
        return root;
      }

      function updateShellState(panel, profile = uiState.profile) {
        uiState.lastPanel = panel || "text";
        uiState.lastUpdated = new Date();
        uiState.profile = profile;
        panelChipEl.textContent = formatPanelLabel(uiState.lastPanel);
        profileChipEl.textContent = `profile: ${uiState.profile}`;
        updatedChipEl.textContent = uiState.lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function formatPanelLabel(value) {
        const text = nonEmptyText(value, "idle");
        const labels = {
          audit: "Governance audit",
          boundary: "Boundary packet",
          casefile: "Casefile",
          continuity: "Continuity report",
          idle: "Idle",
          project_constellation_preview: "Constellation preview",
          repo: "Repo navigation",
          strategy: "Strategy",
          structured: "Structured output",
          text: "Text output",
          work_contract_card: "Work contract",
          work_picker_card: "Work picker",
          working_view: "Working view",
        };
        return labels[text] || formatUiStatus(text);
      }

      function renderPanel(data) {
        panelEl.replaceChildren();
        const profile = resolveProfile(data);

        if (!data) {
          panelTitleEl.textContent = "Console Panel";
          panelEl.appendChild(el("div", { className: "status-box", text: "No structured content yet." }));
          updateShellState("idle");
          return;
        }

        if (data.error) {
          panelTitleEl.textContent = "Tool Error";
          panelEl.appendChild(renderError(data.error));
          if (data.error.tool || data.error.mode) {
            panelEl.appendChild(createMetricGrid([
              ["Tool", data.error.tool || "unknown"],
              ["Mode", data.error.mode || "unknown"],
              ["Profile", data.error.profile || profile],
              ["Read-only", String(Boolean(data.error.readOnly))],
            ]));
          }
          updateShellState("error", profile);
          return;
        }

        switch (data.panel) {
          case "casefile":
            panelTitleEl.textContent = "Casefile";
            panelEl.appendChild(renderCasefile(data.casefile));
            updateShellState("casefile", profile);
            return;
          case "working_view":
            panelTitleEl.textContent = "Working View";
            panelEl.appendChild(renderWorkingView(data.workingView));
            updateShellState("working_view", profile);
            return;
          case "strategy":
            panelTitleEl.textContent = "Strategy";
            panelEl.appendChild(renderStrategy(data.strategy, profile, data.presentation));
            updateShellState("strategy", profile);
            return;
          case "boundary":
            panelTitleEl.textContent = "Boundary Packet";
            panelEl.appendChild(renderBoundary(data.packet, profile));
            updateShellState("boundary", profile);
            return;
          case "continuity":
            panelTitleEl.textContent = "Continuity Report";
            panelEl.appendChild(renderContinuity(data.continuity, profile));
            updateShellState("continuity", profile);
            return;
          case "repo":
            panelTitleEl.textContent = "Repo Navigation";
            panelEl.appendChild(renderRepo(data.repo));
            updateShellState("repo", profile);
            return;
          case "audit":
            panelTitleEl.textContent = "Governance Audit";
            panelEl.appendChild(renderAudit(data.audit, profile));
            updateShellState("audit", profile);
            return;
          case "work_picker_card":
            panelTitleEl.textContent = "Choose a work item";
            panelEl.appendChild(renderWorkPickerCard(data));
            updateShellState("work_picker_card", profile);
            return;
          case "work_contract_card":
            panelTitleEl.textContent = "Work Contract Card";
            panelEl.appendChild(renderWorkContractCard(data));
            updateShellState("work_contract_card", profile);
            return;
          case "project_constellation_preview":
            panelTitleEl.textContent = "Project Constellation Preview";
            panelEl.appendChild(renderProjectConstellationPreview(data));
            updateShellState("project_constellation_preview", profile);
            return;
          default:
            panelTitleEl.textContent = "Structured Output";
            panelEl.appendChild(renderJson(data));
            updateShellState(data.panel || "structured", profile);
        }
      }

      function extractStructured(params) {
        if (params?.structuredContent) {
          return {
            ...params.structuredContent,
            profile: params?._meta?.profile || params.structuredContent.profile || "public",
          };
        }
        const first = params?.content?.[0]?.text;
        if (!first) return null;
        try {
          return {
            ...JSON.parse(first),
            profile: params?._meta?.profile || "public",
          };
        } catch {
          return { text: first, profile: params?._meta?.profile || "public" };
        }
      }

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") return;

          if (message.id && pending.has(message.id)) {
            const req = pending.get(message.id);
            pending.delete(message.id);
            if (message.error) req.reject(message.error);
            else req.resolve(message.result);
            return;
          }

          if (typeof message.method !== "string") return;
          if (message.method === "ui/notifications/tool-result") {
            statusEl.textContent = "Tool output received. Text output remains authoritative if the panel cannot render.";
            renderPanel(extractStructured(message.params));
          }
        },
        { passive: true }
      );

      async function init() {
        try {
          await rpcRequest("ui/initialize", {
            appInfo: { name: "augnes-console-widget", version: "0.1.0" },
            appCapabilities: {},
            protocolVersion: "2026-01-26",
          });
          rpcNotify("ui/notifications/initialized", {});
          statusEl.textContent = "Widget initialized. Run one of the public read-only tools to populate the console.";
        } catch (error) {
          statusEl.textContent = `Failed to initialize widget bridge: ${String(error)}`;
          statusEl.classList.add("error-box");
        }
      }

      init();
    </script>
  </body>
</html>
