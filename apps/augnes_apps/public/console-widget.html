<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Augnes Console</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        --bg: color-mix(in srgb, canvas 90%, #dbe4ea 10%);
        --card: color-mix(in srgb, canvas 92%, #f1f5f7 8%);
        --border: color-mix(in srgb, canvastext 14%, transparent);
        --muted: color-mix(in srgb, canvastext 62%, transparent);
        --accent: #0f5f7a;
        --accent-soft: rgba(15, 95, 122, 0.12);
        --good: #1d6b3f;
        --warn: #9c6700;
        --bad: #a03232;
        --shadow: 0 12px 28px rgba(18, 34, 44, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(15, 95, 122, 0.14), transparent 32%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 32%),
          var(--bg);
        color: canvastext;
      }

      .shell {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .panel,
      .hero {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 16px;
        display: grid;
        gap: 10px;
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .hero h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.2;
      }

      .hero p,
      .muted {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .chip-row,
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 12px;
        line-height: 1.2;
        background: rgba(255, 255, 255, 0.45);
      }

      .tag {
        border-radius: 12px;
      }

      .tag.fetchable {
        border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
        background: color-mix(in srgb, var(--accent-soft) 70%, transparent);
      }

      .tone-pass {
        color: var(--good);
        border-color: color-mix(in srgb, var(--good) 40%, var(--border));
      }

      .tone-warn {
        color: var(--warn);
        border-color: color-mix(in srgb, var(--warn) 40%, var(--border));
      }

      .tone-fail {
        color: var(--bad);
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
      }

      .panel {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
      }

      .summary {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
        background: color-mix(in srgb, var(--accent-soft) 55%, canvas 45%);
        font-size: 14px;
        line-height: 1.55;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.4);
      }

      .metric dt {
        margin: 0 0 6px 0;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .metric dd {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        word-break: break-word;
      }

      details {
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      .section-body {
        padding: 0 14px 14px 14px;
        display: grid;
        gap: 10px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        display: grid;
        gap: 6px;
        background: rgba(255, 255, 255, 0.36);
      }

      .item.selected-item {
        border-color: color-mix(in srgb, var(--accent) 58%, var(--border));
        background: color-mix(in srgb, var(--accent-soft) 70%, canvas 30%);
      }

      .handoff-use-button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--border));
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.44);
        color: canvastext;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        min-height: 32px;
        padding: 6px 10px;
      }

      .handoff-use-button[aria-pressed="true"] {
        background: color-mix(in srgb, var(--accent) 88%, canvastext 12%);
        border-color: color-mix(in srgb, var(--accent) 70%, var(--border));
        color: white;
      }

      .handoff-use-button:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, canvastext);
        outline-offset: 2px;
      }

      .item-title {
        font-weight: 600;
        line-height: 1.35;
      }

      .item-note,
      .meta-line {
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 8px;
      }

      .code-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .code {
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        font-size: 12px;
        padding: 5px 8px;
        border-radius: 10px;
        background: rgba(19, 37, 49, 0.08);
        border: 1px solid var(--border);
        word-break: break-all;
      }

      .recommended {
        padding: 14px;
        border-radius: 14px;
        background:
          linear-gradient(135deg, rgba(15, 95, 122, 0.92), rgba(18, 54, 69, 0.92)),
          var(--accent);
        color: white;
      }

      .recommended small {
        display: block;
        opacity: 0.78;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      .recommended strong {
        display: block;
        font-size: 20px;
      }

      .status-box {
        padding: 12px;
        border-radius: 14px;
        border: 1px dashed var(--border);
        font-size: 13px;
        line-height: 1.5;
        color: var(--muted);
      }

      .copy-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .copy-button {
        appearance: none;
        border: 1px solid color-mix(in srgb, var(--accent) 52%, var(--border));
        border-radius: 12px;
        background: color-mix(in srgb, var(--accent) 88%, canvastext 12%);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 36px;
        padding: 7px 12px;
      }

      .copy-button:focus-visible {
        outline: 2px solid color-mix(in srgb, var(--accent) 70%, canvastext);
        outline-offset: 2px;
      }

      .error-box {
        border-color: color-mix(in srgb, var(--bad) 40%, var(--border));
        color: var(--bad);
        background: rgba(160, 50, 50, 0.08);
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(19, 37, 49, 0.08);
        overflow: auto;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 10px;
        }

        .hero,
        .panel {
          border-radius: 14px;
          padding: 12px;
        }

        .hero-top,
        .panel-head {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1>Augnes: Evidence &amp; Continuity Console</h1>
            <p>Read-first surface only. Augnes Core remains the authority holder.</p>
          </div>
          <div class="stat-row">
            <span class="chip">v1 read-only</span>
            <span id="profile-chip" class="chip">profile: public</span>
          </div>
        </div>
        <div class="chip-row">
          <span class="chip">evidence-backed</span>
          <span class="chip">boundary-aware</span>
          <span class="chip">continuity-visible</span>
          <span class="chip">no canonical writes</span>
        </div>
        <div id="status" class="status-box">Waiting for tool output…</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="panel-title">Console Panel</h2>
          <div class="stat-row">
            <span id="panel-chip" class="chip">idle</span>
            <span id="updated-chip" class="chip">not updated</span>
          </div>
        </div>
        <div id="panel"></div>
      </section>
    </div>

    <script type="module">
      const statusEl = document.getElementById("status");
      const panelEl = document.getElementById("panel");
      const panelTitleEl = document.getElementById("panel-title");
      const panelChipEl = document.getElementById("panel-chip");
      const updatedChipEl = document.getElementById("updated-chip");
      const profileChipEl = document.getElementById("profile-chip");

      let requestId = 0;
      const pending = new Map();
      const uiState = {
        lastPanel: "idle",
        lastUpdated: null,
        profile: "public",
      };

      function rpcRequest(method, params) {
        return new Promise((resolve, reject) => {
          const id = `req-${++requestId}`;
          pending.set(id, { resolve, reject });
          window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        });
      }

      function rpcNotify(method, params) {
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      }

      function el(tag, options = {}) {
        const node = document.createElement(tag);
        if (options.className) node.className = options.className;
        if (options.text) node.textContent = options.text;
        if (options.html) node.innerHTML = options.html;
        return node;
      }

      function codeChip(text) {
        return el("span", { className: "code", text });
      }

      function badge(text, tone) {
        const className = tone ? `chip tone-${tone}` : "chip";
        return el("span", { className, text });
      }

      function tag(text, options = {}) {
        const className = `tag${options.fetchable ? " fetchable" : ""}${options.tone ? ` tone-${options.tone}` : ""}`;
        return el("span", { className, text });
      }

      function createMetricGrid(entries) {
        const grid = el("dl", { className: "metric-grid" });
        entries.forEach(([label, value]) => {
          const card = el("div", { className: "metric" });
          const dt = el("dt", { text: label });
          const dd = el("dd", { text: value });
          card.append(dt, dd);
          grid.appendChild(card);
        });
        return grid;
      }

      function createSection(title, contentNode, options = {}) {
        const details = document.createElement("details");
        details.open = options.open !== false;
        const summary = document.createElement("summary");
        summary.append(el("span", { text: title }));
        if (options.badge) {
          summary.appendChild(tag(options.badge));
        }
        const body = el("div", { className: "section-body" });
        body.appendChild(contentNode);
        details.append(summary, body);
        return details;
      }

      function resolveProfile(data) {
        return data?.profile === "chrono_lab" ? "chrono_lab" : "public";
      }

      function isLabProfile(profile) {
        return profile === "chrono_lab";
      }

      function createList(items, renderItem) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("div", { className: "stack" });
        items.forEach((item) => list.appendChild(renderItem(item)));
        return list;
      }

      function createTextList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const list = el("ul", { className: "list" });
        items.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
        return list;
      }

      function createCodeList(items) {
        if (!items || !items.length) {
          return el("div", { className: "status-box", text: "No items." });
        }

        const wrap = el("div", { className: "code-list" });
        items.forEach((item) => wrap.appendChild(codeChip(item)));
        return wrap;
      }

      function createEvidenceCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title || item.id }));
        if (item.stance) {
          const tone = item.stance === "supporting" ? "pass" : item.stance === "contradicting" ? "fail" : "";
          titleRow.appendChild(tag(item.stance, { tone }));
        }
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        if (item.note) {
          card.appendChild(el("div", { className: "item-note", text: item.note }));
        }
        if (item.url) {
          card.appendChild(el("div", { className: "item-note", text: item.url }));
        }
        return card;
      }

      function createRepoNodeCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.kind));
        titleRow.appendChild(tag(item.fetchable ? "fetchable" : "view-only", { fetchable: item.fetchable }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `Node: ${item.nodeId}` }));
        return card;
      }

      function createGateCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.gate }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createTransitionCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.scenario }));
        titleRow.appendChild(tag(item.status, { tone: item.status }));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "item-note", text: item.note }));
        return card;
      }

      function createCarryForwardCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: item.title }));
        titleRow.appendChild(tag(item.stage));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.why }));
        return card;
      }

      function createTraceCapsuleCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: item.title }));
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${item.id}` }));
        card.appendChild(el("div", { className: "item-note", text: item.reuseValue }));
        return card;
      }

      function renderJson(value) {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(value, null, 2);
        return pre;
      }

      function createPreBlock(text) {
        const pre = document.createElement("pre");
        pre.textContent = text;
        return pre;
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch {
            // Developer Mode iframes may block Clipboard API while preserving user activation.
          }
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "0";
        textarea.style.opacity = "0";
        document.body?.appendChild(textarea);

        try {
          textarea.focus?.();
          textarea.select?.();
          textarea.setSelectionRange?.(0, textarea.value.length);
          return document.execCommand?.("copy") === true;
        } catch {
          return false;
        } finally {
          textarea.remove?.();
        }
      }

      function selectElementText(element) {
        try {
          if (!element || !document.createRange || !window.getSelection) return false;
          const range = document.createRange();
          range.selectNodeContents(element);
          const selection = window.getSelection();
          if (!selection) return false;
          selection.removeAllRanges();
          selection.addRange(range);
          return true;
        } catch {
          return false;
        }
      }

      function renderCopyableHandoffPacket(preview) {
        const root = el("div", { className: "stack" });
        const packetText = preview.copyable_handoff_text;
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The packet is for a separate Codex session; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, merge, or enable auto-merge.",
        });
        status.setAttribute("aria-live", "polite");
        const preflightHint = el("div", {
          className: "status-box",
          text:
            "After copying, validate locally with codex:handoff-preflight. Copy this packet into a file or stdin before using it in a separate Codex session. Default mode checks copied packets; strict mode requires concrete current-runtime confirmation.",
        });
        const copyRow = el("div", { className: "copy-row" });
        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.textContent = "Copy Codex Handoff";
        const pre = createPreBlock(packetText);
        copyButton.addEventListener("click", async () => {
          if (await copyTextToClipboard(packetText)) {
            status.textContent = "Handoff copied.";
          } else if (selectElementText(pre)) {
            status.textContent = "Clipboard blocked by this host. Packet text selected; press Command+C to copy.";
          } else {
            status.textContent = "Copy unavailable. Select and copy the packet text manually.";
          }
        });
        copyRow.appendChild(copyButton);
        root.append(status, preflightHint, copyRow, pre);
        return root;
      }

      function nonEmptyText(value, fallback) {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      function safeArray(value) {
        if (!Array.isArray(value)) return [];
        return value.filter((item) => typeof item === "string" && item.trim()).map((item) => item.trim());
      }

      function safeCount(value) {
        return Number.isFinite(value) ? String(value) : "0";
      }

      function createCodeListWithFallback(items, fallback) {
        const list = safeArray(items);
        if (!list.length) {
          return el("div", { className: "status-box", text: fallback });
        }
        return createCodeList(list);
      }

      function safeRecord(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function safeRecordArray(value) {
        return Array.isArray(value) ? value.filter((item) => item && typeof item === "object" && !Array.isArray(item)) : [];
      }

      function firstRecord(...values) {
        for (const value of values) {
          const record = safeRecord(value);
          if (Object.keys(record).length) return record;
        }
        return {};
      }

      function sourceRefText(sourceRef) {
        if (typeof sourceRef === "string") return sourceRef;
        const record = safeRecord(sourceRef);
        return nonEmptyText(record.source_ref || record.target_ref || record.label || record.id, "");
      }

      function summarizeContextEvidenceRef(item) {
        const record = safeRecord(item);
        const pointerId = nonEmptyText(record.pointer_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const targetRef = nonEmptyText(record.target_ref, "");
        return [pointerId, label, targetRef ? `-> ${targetRef}` : ""].filter(Boolean).join(": ");
      }

      function summarizeContextTension(item) {
        const record = safeRecord(item);
        const tensionId = nonEmptyText(record.tension_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const summary = nonEmptyText(record.summary, "");
        return [tensionId, label, summary].filter(Boolean).join(": ");
      }

      function summarizeContextNextAction(item) {
        const record = safeRecord(item);
        const candidateId = nonEmptyText(record.candidate_id || record.id, "");
        const label = nonEmptyText(record.label, "");
        const summary = nonEmptyText(record.summary, "");
        return [candidateId, label, summary].filter(Boolean).join(": ");
      }

      function normalizeWorkContractConstellationContext(data) {
        const card = safeRecord(data?.work_contract_card);
        const preview = safeRecord(data?.project_constellation_preview);
        const compact = firstRecord(
          data?.work_contract_constellation_context,
          data?.constellation_context,
          card.constellation_context,
          safeRecord(data?.codex_handoff_preview).constellation_context,
          preview
        );
        const project = safeRecord(compact.project_constellation || data?.project_constellation);
        const thesis = nonEmptyText(compact.thesis || project.thesis, "");

        if (!Object.keys(compact).length || !thesis) {
          return {
            status: "missing",
            fallback_text: "No Project Constellation context is attached to this work contract.",
            thesis: "",
            selected_candidate_id: "",
            selected_candidate_label: "",
            selection_status: "",
            selection_fallback_reason: "",
            pointer_evidence_ref_count: 0,
            pointer_evidence_refs: [],
            unresolved_tension_count: 0,
            unresolved_tensions: [],
            advisory_next_action_summary: "",
            source_refs: [],
            boundary_text: [
              "Project Constellation context is optional read-only operator context.",
              "Missing context is not reconstructed or invented.",
            ],
          };
        }

        const selection = safeRecord(compact.selection);
        const copySeed = safeRecord(compact.copyable_handoff_seed);
        const evidencePointers = safeRecordArray(compact.evidence_pointers || data?.evidence_pointers || project.evidence_pointers);
        const unresolvedTensions = safeRecordArray(compact.unresolved_tensions || data?.unresolved_tensions || project.unresolved_tensions);
        const nextActionCandidates = safeRecordArray(compact.next_action_candidates || data?.next_action_candidates || project.next_action_candidates);
        const selectedCandidateId = nonEmptyText(
          compact.selected_candidate_id || selection.selected_candidate_id || copySeed.selected_candidate_id,
          ""
        );
        const selectedCandidate =
          selectedCandidateId
            ? nextActionCandidates.find((candidate) => nonEmptyText(candidate.candidate_id, "") === selectedCandidateId)
            : nextActionCandidates[0];
        const pointerRefs = safeArray(compact.pointer_evidence_refs || compact.evidence_refs);

        const compactSourceRefs = safeArray(compact.source_refs).length
          ? safeArray(compact.source_refs)

          ? safeArray(data?.source_refs)

      function memoryReuseAttachmentBoundaryText() {
        return [
          "Memory Reuse attachment is a read-only proposal preview.",

          "No execution, writes, provider calls, branch creation, PR creation, proof/evidence recording, publication, merge, retry, replay, or deploy authority.",

      function fallbackMemoryReuseBrief(status) {
        if (status === "not_configured") {
          return "Memory Reuse attachment proposal is not configured for this payload; no memory intake was run by this surface.";
        }
        if (status === "unavailable") {
          return "Memory Reuse attachment proposal is unavailable in this payload; no selected memory IDs were attached or invented.";
        }
        if (status === "proposed") {
          return "Selected persisted memory items are attached as read-only prior context; preserve the listed reuse boundaries.";
        }
        return "No persisted perspective-memory items were selected for this Work Contract context; continue without reuse or run Perspective Memory Reuse Intake separately before starting Codex.";
      }

      function normalizeMemoryReuseSourceContext(value, fallback) {
        const sourceContext = nonEmptyText(value, "");
        return ["work_contract", "constellation_context", "final_handoff_packet"].includes(sourceContext)
          ? sourceContext
          : fallback;
      }

      function selectedMemoryIdsFromProposal(source) {
        const direct = safeArray(source?.selected_memory_ids);
        const fromItems = safeRecordArray(source?.selected_memory_items)
          .map((item) => nonEmptyText(item.memory_item_id || item.item_id || item.id, ""))
          .filter(Boolean);
        return [...new Set([...direct, ...fromItems])];
      }

      function normalizeMemoryReuseAttachmentProposal(source, preview, card) {
        const record = safeRecord(source);
        const selectedIds = selectedMemoryIdsFromProposal(record);
        const statusSource = nonEmptyText(record.status, "");
        const validStatus = ["proposed", "no_match", "unavailable", "not_configured"].includes(statusSource)
          ? statusSource
          : "";
        const warnings = safeArray(record.warnings);
        let status = validStatus || (selectedIds.length ? "proposed" : "no_match");
        if (status === "proposed" && selectedIds.length === 0) {
          status = "no_match";
          warnings.push("Attached Memory Reuse proposal had proposed status without selected memory IDs; no memory IDs were invented.");
        }
        if (selectedIds.length > 0 && status !== "proposed") {
          status = "proposed";
          warnings.push("Attached Memory Reuse proposal included selected memory IDs; status is surfaced as proposed.");
        }
        if (
          selectedIds.length === 0 &&
          (safeArray(record.why_selected).length || safeArray(record.reuse_boundary).length)
        ) {
          warnings.push("Attached Memory Reuse rationale was ignored because no selected memory IDs were attached.");
        }
        const selectionGuidance = safeArray(record.selection_guidance);
        const taskSummary = nonEmptyText(
          record.task_summary || record.task_ref || preview?.work_next_action || card?.current_or_next_step || preview?.work_title || card?.work_title,
          "Work Contract task context."
        );
        const defaultSourceContext = preview?.constellation_context?.status === "attached" || card?.constellation_context?.status === "attached"
          ? "constellation_context"
          : "work_contract";
        const boundary = [...memoryReuseAttachmentBoundaryText(), ...safeArray(record.boundary_text)];
        return {
          proposal_type: "memory_reuse_attachment_proposal",
          status,
          task_summary: taskSummary,
          task_ref: nonEmptyText(record.task_ref || card?.work_id || preview?.work_id, ""),
          source_context: normalizeMemoryReuseSourceContext(record.source_context, defaultSourceContext),
          selected_memory_ids: selectedIds,
          selected_memory_count: selectedIds.length,
          why_selected: selectedIds.length ? safeArray(record.why_selected) : [],
          reuse_boundary: selectedIds.length ? safeArray(record.reuse_boundary) : [],
          selection_guidance: selectionGuidance.length
            ? selectionGuidance
            : status === "proposed"
              ? [
                  "Review selected persisted memory IDs and reuse boundaries before starting a separate Codex session.",
                  "Treat the attachment as prior context only, not runtime authority.",
                ]
              : status === "no_match"
                ? [
                    "No persisted perspective-memory items were selected from the attached Work Contract context.",
                    "Continue without reuse or run Perspective Memory Reuse Intake separately before starting Codex if memory context is required.",
                  ]
                : [
                    `Memory Reuse proposal data is ${status} in this Work Contract payload.`,
                    "No selected memory IDs were attached or invented.",
                  ],
          fallback_brief: nonEmptyText(record.fallback_brief, fallbackMemoryReuseBrief(status)),
          warnings,
          boundary_text: boundary,
        };
      }

      function memoryReuseProposalLineItems(proposal) {

          "- Selected memory IDs:",
          ...(selectedIds.length ? selectedIds.map((item) => `  - ${item}`) : ["  - No persisted memory IDs selected."]),

        if (whySelected.length) {
          lines.push("- Why selected:", ...whySelected.map((item) => `  - ${item}`));

        try {

          {
            id: "no_forbidden_control_labels",
            status: containsForbiddenFinalHandoffLabel(text) ? "fail" : "pass",
            message: containsForbiddenFinalHandoffLabel(text)
              ? "A forbidden execution/write control label is present."
              : "No execution/write control labels are present.",
          },
          {
            id: "structured_json_block",
            status: block.value ? "pass" : "fail",
            message: block.value ? "Structured JSON block is present and parseable." : block.error,
          },
        ];
        const hasFail = checks.some((check) => check.status === "fail");
        const hasWarn = checks.some((check) => check.status === "warn");
        const status = hasFail ? "fail" : hasWarn ? "warn" : "pass";
        return {
          preflight_type: "final_handoff_preflight",
          status,
          summary:
            status === "pass"
              ? "Final handoff packet passes local read-only preflight."
              : status === "warn"
                ? "Final handoff packet has local preflight warnings."
                : "Final handoff packet failed local preflight.",
          checks,
          checked_packet_type: "final_codex_handoff_packet",
          checker: "app_local_final_handoff_preview_checker",
          local_only: true,
          pure: true,
          did_not_spawn_shell_or_npm: true,
          did_not_call_runtime: true,
          did_not_call_github_openai_or_provider: true,
          did_not_record_proof_or_evidence: true,
          did_not_execute_codex: true,
        };
      }

      function normalizeFinalHandoffPreflight(data, packet) {
        const source = safeRecord(data?.final_handoff_preflight);
        const checks = safeRecordArray(source.checks);
        if (source.status && checks.length) {
          return {
            preflight_type: nonEmptyText(source.preflight_type, "final_handoff_preflight"),
            status: nonEmptyText(source.status, "unavailable"),
            summary: nonEmptyText(source.summary, "Final handoff preflight status is unavailable."),
            checks,
            checked_packet_type: nonEmptyText(source.checked_packet_type, "final_codex_handoff_packet"),
            checker: nonEmptyText(source.checker, "app_local_final_handoff_preview_checker"),
            local_only: source.local_only !== false,
            pure: source.pure !== false,
            did_not_spawn_shell_or_npm: source.did_not_spawn_shell_or_npm !== false,
            did_not_call_runtime: source.did_not_call_runtime !== false,
            did_not_call_github_openai_or_provider: source.did_not_call_github_openai_or_provider !== false,
            did_not_record_proof_or_evidence: source.did_not_record_proof_or_evidence !== false,
            did_not_execute_codex: source.did_not_execute_codex !== false,
          };
        }
        return localFinalPreflight(packet);
      }

      function safeObject(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : {};
      }

      function safeObjectArray(value) {
        return Array.isArray(value) ? value.filter((item) => item && typeof item === "object") : [];

        root.appendChild(createSection(
          "Memory Reuse attachment",
          renderMemoryReuseAttachmentProposal(packet.memory_reuse_attachment_proposal || packet.handoff_automation_slots?.memory_reuse_attachment?.proposal),
          { badge: nonEmptyText(packet.memory_reuse_attachment_proposal?.status, "no_match") }
        ));
        root.appendChild(createSection(
          "Codex PR body checklist / closeout skeleton",
          renderPrBodyChecklistPreview(packet.pr_body_checklist_preview || packet.codex_pr_body_checklist, packet.codex_closeout_skeleton || packet.final_handoff_closeout_skeleton, preflight),
          { badge: nonEmptyText(packet.handoff_automation_slots?.pr_body_checklist?.status, "preview_only") }
        ));
        root.appendChild(createSection("Future attachment slots", renderHandoffAutomationSlots(packet.handoff_automation_slots), { badge: "preview" }));
        root.appendChild(createSection(
          "Copyable handoff packet",
          renderCopyableHandoffPacket({ copyable_handoff_text: packet.copyable_handoff_text }),
          { badge: "final packet" }
        ));
        return root;
      }

      function renderCodexHandoffPreview(data, card) {
        const preview = normalizeCodexHandoffPreview(data, card);
        const root = el("div", { className: "stack" });

        root.appendChild(createMetricGrid([
          ["Readiness", preview.readiness_status],
          ["Task profile", preview.task_profile],
          ["Current runtime", preview.runtime_endpoint_label],
          ["Evidence recording", preview.evidence_recording],
          ["Proof-only closeout", preview.proof_only_closeout],
          ["Browser verification", preview.browser_verification],
        ]));
        root.appendChild(createSection("Readiness reasons", createTextList(preview.readiness_reasons), { badge: preview.readiness_status }));
        root.appendChild(createSection("Work item", createMetricGrid([
          ["Scope", preview.scope],
          ["Work ID", preview.work_id],
          ["Title", preview.work_title],
          ["Status", preview.work_status],
          ["Next action", preview.work_next_action],
        ]), { badge: "work-centered" }));
        root.appendChild(createSection("Expected scope", createTextList([
          "Expected files:",
          ...safeArray(preview.expected_files).map((item) => `- ${item}`),
          safeArray(preview.expected_files).length ? "" : "No expected files are listed in the work brief.",
          "Expected checks:",
          ...safeArray(preview.expected_checks).map((item) => `- ${item}`),
          safeArray(preview.expected_checks).length ? "" : "No expected checks are listed in the work brief.",
          "Related state keys:",
          ...safeArray(preview.related_state_keys).map((item) => `- ${item}`),
          safeArray(preview.related_state_keys).length ? "" : "No related state keys are listed in the work brief.",
        ].filter(Boolean)), { badge: "scope" }));
        root.appendChild(createSection("Forbidden actions", createTextList(preview.forbidden_actions), { badge: "no writes" }));
        root.appendChild(createSection("Stop conditions", createTextList(preview.stop_conditions), { badge: "stop" }));
        root.appendChild(createSection(
          "Final Codex Handoff",
          renderFinalCodexHandoffPacket(preview.final_codex_handoff_packet, preview.final_handoff_preflight),
          { badge: preview.final_handoff_preflight.status }
        ));
        root.appendChild(createSection("Preview boundary", createTextList(preview.boundary_text), { badge: "read-only" }));
        return root;
      }

      function renderWorkContractCard(data) {
        const card = normalizeWorkContractCard(data);
        const root = el("div", { className: "stack" });

        root.appendChild(createMetricGrid([
          ["Scope", card.scope],
          ["Work ID", card.work_id],
          ["Status", card.work_status],
          ["Priority", card.priority],
          ["Recent events", safeCount(card.recent_events_count)],
          ["Linked action IDs", safeCount(card.linked_proof_action_ids_count)],
          ["Linked PR refs", safeCount(card.linked_prs_count)],
          ["Linked docs", safeCount(card.linked_docs_count)],
        ]));
        root.appendChild(el("p", { className: "summary", text: card.work_title }));
        root.appendChild(createSection("Current / next step", el("div", { className: "status-box", text: card.current_or_next_step })));
        root.appendChild(createSection("Expected files", createCodeListWithFallback(card.expected_files, card.expected_files_summary), { badge: `${safeArray(card.expected_files).length}` }));
        root.appendChild(createSection("Expected checks", createCodeListWithFallback(card.expected_checks, card.expected_checks_summary), { badge: `${safeArray(card.expected_checks).length}` }));
        root.appendChild(createSection("Related state keys", createCodeListWithFallback(card.related_state_keys, card.related_state_keys_summary), { badge: `${safeArray(card.related_state_keys).length}` }));
        root.appendChild(createSection("Proof and evidence expectations", createTextList([
          card.linked_proof_summary,
          card.proof_evidence_expectation_summary,
          card.skipped_check_expectation_summary,
        ]), { badge: "read-only" }));
        root.appendChild(createSection(
          "Project Constellation context",
          renderWorkContractConstellationContext(card.constellation_context),
          { badge: card.constellation_context?.status === "attached" ? "read-only" : "not attached" }
        ));
        root.appendChild(createSection("Authority boundary", createTextList(card.authority_boundary_text), { badge: "no writes" }));
        root.appendChild(createSection("Codex Handoff Preview", renderCodexHandoffPreview(data, card), { badge: "copy packet" }));
        return root;
      }

      function createConstellationNodeCard(item) {
        const card = el("div", { className: "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.append(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.id, "Unnamed node")) }));
        titleRow.appendChild(tag(nonEmptyText(item.type, "node")));
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${nonEmptyText(item.id, "unknown")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.summary, "No node summary returned.") }));
        const pointers = safeObjectArray(item.evidence_pointers).map((pointer) => nonEmptyText(pointer.pointer_id, ""));
        if (pointers.length) {
          card.appendChild(el("div", { className: "item-note", text: `Evidence refs: ${pointers.join(", ")}` }));
        }
        return card;
      }

      function createConstellationEdgeCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.id, "Unnamed edge") }));
        card.appendChild(el("div", { className: "meta-line", text: `${nonEmptyText(item.source, "unknown")} -> ${nonEmptyText(item.target, "unknown")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.summary, "No edge summary returned.") }));
        return card;
      }

      function createConstellationClusterCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.id, "Unnamed cluster")) }));
        card.appendChild(el("div", { className: "meta-line", text: `Nodes: ${safeArray(item.node_ids).join(", ") || "none"}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.cluster_thesis, "No cluster thesis returned.") }));
        return card;
      }

      function createConstellationEvidenceCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.pointer_id, "Unnamed evidence pointer")) }));
        card.appendChild(el("div", { className: "meta-line", text: `Pointer: ${nonEmptyText(item.pointer_id, "unknown")}` }));
        card.appendChild(el("div", { className: "meta-line", text: `Target: ${nonEmptyText(item.target_ref, "No target ref returned.")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.bounded_summary, "Pointer-only evidence ref; no proof or evidence record is created.") }));
        return card;
      }

      function createConstellationTensionCard(item) {
        const card = el("div", { className: "item" });
        card.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.tension_id, "Unresolved tension")) }));
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${nonEmptyText(item.tension_id, "unknown")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.summary, "No tension summary returned.") }));
        return card;
      }

      function listForConstellationHandoff(items, fallback) {
        const values = Array.isArray(items) ? items.filter((item) => typeof item === "string" && item.trim()) : [];
        return values.length ? values.map((item) => `- ${item}`).join("\n") : `- ${fallback}`;
      }

      function summarizeConstellationEvidencePointer(pointer) {
        return `${nonEmptyText(pointer.pointer_id, "unknown")}: ${nonEmptyText(pointer.label, "Evidence pointer")} -> ${nonEmptyText(pointer.target_ref, "No target ref returned.")}`;
      }

      function summarizeConstellationTension(tension) {
        return `${nonEmptyText(tension.tension_id, "unknown")}: ${nonEmptyText(tension.summary, "No tension summary returned.")}`;
      }

      function summarizeConstellationNextAction(action) {
        return `${nonEmptyText(action.candidate_id, "unknown")}: ${nonEmptyText(action.summary, "No advisory next action summary returned.")}`;
      }

      function sourceRefLabel(sourceRef) {
        if (typeof sourceRef === "string") return sourceRef;
        if (!sourceRef || typeof sourceRef !== "object") return "";
        return nonEmptyText(sourceRef.source_ref || sourceRef.target_ref || sourceRef.label || sourceRef.id, "");
      }

      function buildConstellationHandoffSeedText(preview, candidate, selection) {
        const project = preview.project_constellation;
        const seed = preview.copyable_handoff_seed;
        if (preview.fallback_text || !candidate) {
          return nonEmptyText(seed.preview_text, [
            "Augnes Project Constellation handoff seed",
            "No Project Constellation route payload was returned. This fallback does not invent missing context and does not execute Codex.",
          ].join("\n"));
        }

        const sourceRefs = safeArray(seed.source_refs).length
          ? safeArray(seed.source_refs)
          : safeObjectArray(preview.source_refs).map(sourceRefLabel).filter(Boolean);
        const fallbackReason = nonEmptyText(selection.selection_fallback_reason, "");

        return [
          "Augnes Project Constellation handoff seed",
          "This is manual preview text for a separate user-started Codex task. It does not execute Codex.",
          "",
          "Repository",
          "- hynk-studio/augnes",
          "- Base: main",
          `- Scope: ${preview.scope}`,
          "",
          "Project thesis",
          project.thesis,
          "",
          "Selected/default advisory next action",
          `- ${summarizeConstellationNextAction(candidate)}`,
          "",
          "Selection status",
          `- Status: ${selection.selection_status}`,
          `- Requested candidate: ${selection.requested_candidate_id || "none"}`,
          `- Selected candidate: ${selection.selected_candidate_id || "none"}`,
          fallbackReason ? `- Fallback: ${fallbackReason}` : "- Fallback: none",
          "",
          "Bounded node summaries",
          listForConstellationHandoff(
            project.nodes.map((node) => `${nonEmptyText(node.id, "unknown")}: ${nonEmptyText(node.label, "Node")} - ${nonEmptyText(node.summary, "No node summary returned.")}`),
            "No node summaries were returned."
          ),
          "",
          "Bounded edge summaries",
          listForConstellationHandoff(
            project.edges.map((edge) => `${nonEmptyText(edge.id, "unknown")}: ${nonEmptyText(edge.source, "unknown")} -> ${nonEmptyText(edge.target, "unknown")} - ${nonEmptyText(edge.summary, "No edge summary returned.")}`),
            "No edge summaries were returned."
          ),
          "",
          "Bounded cluster summaries",
          listForConstellationHandoff(
            project.clusters.map((cluster) => `${nonEmptyText(cluster.id, "unknown")}: ${nonEmptyText(cluster.label, "Cluster")} - ${nonEmptyText(cluster.cluster_thesis, "No cluster thesis returned.")}`),
            "No cluster summaries were returned."
          ),
          "",
          "Pointer-only evidence refs",
          listForConstellationHandoff(preview.evidence_pointers.map(summarizeConstellationEvidencePointer), "No evidence pointers were returned."),
          "",
          "Unresolved tensions",
          listForConstellationHandoff(preview.unresolved_tensions.map(summarizeConstellationTension), "No unresolved tensions were returned."),
          "",
          "Required checks",
          listForConstellationHandoff(seed.required_checks, "No required checks listed."),
          "",
          "Skipped check policy",
          `- ${seed.skipped_check_policy}`,
          "",
          "Final report requirements",
          listForConstellationHandoff(seed.final_report_requirements, "No final report requirements listed."),
          "",
          "Authority boundaries",
          listForConstellationHandoff(seed.boundary_text, "No boundary text listed."),
          "",
          "Source refs",
          listForConstellationHandoff(sourceRefs, "No source refs were returned."),
        ].join("\n");
      }

      function buildConstellationHandoffSeedForCandidate(preview, candidate, selectionStatus = "selected") {
        const candidateId = nonEmptyText(candidate?.candidate_id, "");
        const candidateLabel = nonEmptyText(candidate?.label, "");
        const selection = {
          requested_candidate_id: candidateId,
          selected_candidate_id: candidateId,
          selected_candidate_label: candidateLabel,
          selection_status: selectionStatus,
          selection_fallback_reason: "",
        };
        return {
          ...preview.copyable_handoff_seed,
          status: preview.fallback_text ? "unavailable" : "available",
          requested_candidate_id: selection.requested_candidate_id,
          selected_candidate_id: selection.selected_candidate_id,
          selected_candidate_label: selection.selected_candidate_label,
          selection_status: selection.selection_status,
          selection_fallback_reason: selection.selection_fallback_reason,
          selection,
          preview_text: buildConstellationHandoffSeedText(preview, candidate, selection),
        };
      }

      function createConstellationNextActionCard(item, selectionController) {
        const isSelected = selectionController?.isSelected(item) === true;
        const card = el("div", { className: isSelected ? "item selected-item" : "item" });
        const titleRow = el("div", { className: "stat-row" });
        titleRow.appendChild(el("div", { className: "item-title", text: nonEmptyText(item.label, nonEmptyText(item.candidate_id, "Advisory next action")) }));
        const stateTag = tag(isSelected ? "selected" : "advisory");
        titleRow.appendChild(stateTag);
        card.appendChild(titleRow);
        card.appendChild(el("div", { className: "meta-line", text: `ID: ${nonEmptyText(item.candidate_id, "unknown")}` }));
        card.appendChild(el("div", { className: "item-note", text: nonEmptyText(item.summary, "No advisory next action summary returned.") }));
        if (selectionController) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "handoff-use-button";
          button.textContent = "Use for handoff";
          button.setAttribute("aria-pressed", isSelected ? "true" : "false");
          button.addEventListener("click", () => selectionController.select(item));
          card.appendChild(button);
          selectionController.register({
            candidate_id: nonEmptyText(item.candidate_id, ""),
            card,
            button,
            stateTag,
          });
        }
        return card;
      }

      function renderCopyableConstellationHandoff(seed) {
        const root = el("div", { className: "stack" });
        const status = el("div", {
          className: "status-box",
          text:
            "Copy action only. The handoff seed is manual preview text; copying does not execute Codex, approve anything, record proof or evidence, mutate Augnes state, create branches or PRs, merge, or publish.",
        });
        status.setAttribute("aria-live", "polite");
        const copyRow = el("div", { className: "copy-row" });
        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.className = "copy-button";
        copyButton.textContent = "Copy Handoff Preview";
        const pre = createPreBlock(seed.preview_text);
        copyButton.addEventListener("click", async () => {
          if (await copyTextToClipboard(seed.preview_text)) {
            status.textContent = "Handoff preview copied.";
          } else if (selectElementText(pre)) {
            status.textContent = "Clipboard blocked by this host. Preview text selected; press Command+C to copy.";
          } else {
            status.textContent = "Copy unavailable. Select and copy the preview text manually.";
          }
        });
        copyRow.appendChild(copyButton);
        root.append(status, copyRow, pre);
        return root;
      }

      function renderProjectConstellationPreview(data) {
        const preview = normalizeProjectConstellationPreview(data);
        const project = preview.project_constellation;
        const root = el("div", { className: "stack" });
        const defaultCandidate = preview.next_action_candidates.find(
          (candidate) => nonEmptyText(candidate.candidate_id, "") === preview.copyable_handoff_seed.selected_candidate_id
        ) || preview.next_action_candidates[0] || null;
        let selectedCandidateId = preview.copyable_handoff_seed.selected_candidate_id || nonEmptyText(defaultCandidate?.candidate_id, "");
        let currentHandoffSeed = preview.copyable_handoff_seed;
        const seedHost = el("div", { className: "stack" });
        const actionCardRefs = [];
        const renderSeed = () => {
          seedHost.replaceChildren(renderCopyableConstellationHandoff(currentHandoffSeed));
        };
        const updateActionCardStates = () => {
          actionCardRefs.forEach((ref) => {
            const isSelected = ref.candidate_id === selectedCandidateId;
            ref.card.className = isSelected ? "item selected-item" : "item";
            ref.button.setAttribute("aria-pressed", isSelected ? "true" : "false");
            ref.stateTag.textContent = isSelected ? "selected" : "advisory";
          });
        };
        const selectionController = {
          isSelected(candidate) {
            return nonEmptyText(candidate.candidate_id, "") === selectedCandidateId;
          },
          select(candidate) {
            const candidateId = nonEmptyText(candidate.candidate_id, "");
            if (!candidateId) return;
            selectedCandidateId = candidateId;
            currentHandoffSeed = buildConstellationHandoffSeedForCandidate(preview, candidate, "selected");
            renderSeed();
            updateActionCardStates();
          },
          register(ref) {
            actionCardRefs.push(ref);
          },
        };
        renderSeed();

        root.appendChild(createMetricGrid([
          ["Scope", preview.scope],
          ["Status", preview.status],
          ["Boundary", project.boundary_class],
          ["Nodes", safeCount(project.nodes.length)],
          ["Edges", safeCount(project.edges.length)],
          ["Clusters", safeCount(project.clusters.length)],
          ["Evidence refs", safeCount(preview.evidence_pointers.length)],
          ["Next actions", safeCount(preview.next_action_candidates.length)],
        ]));
        root.appendChild(el("p", { className: "summary", text: project.thesis }));
        if (preview.fallback_text) {
          root.appendChild(el("div", { className: "status-box error-box", text: preview.fallback_text }));
        }
        root.appendChild(createSection("Nodes", createList(project.nodes, createConstellationNodeCard), { badge: `${project.nodes.length}` }));
        root.appendChild(createSection("Edges", createList(project.edges, createConstellationEdgeCard), { badge: `${project.edges.length}` }));
        root.appendChild(createSection("Clusters", createList(project.clusters, createConstellationClusterCard), { badge: `${project.clusters.length}` }));
        root.appendChild(createSection("Pointer-only evidence refs", createList(preview.evidence_pointers, createConstellationEvidenceCard), { badge: `${preview.evidence_pointers.length}` }));
        root.appendChild(createSection("Unresolved tensions", createList(preview.unresolved_tensions, createConstellationTensionCard), { badge: `${preview.unresolved_tensions.length}` }));
        root.appendChild(createSection("Advisory next action candidates", createList(preview.next_action_candidates, (candidate) => createConstellationNextActionCard(candidate, selectionController)), { badge: `${preview.next_action_candidates.length}` }));
        root.appendChild(createSection("Copyable handoff seed", seedHost, { badge: preview.copyable_handoff_seed.status }));
        root.appendChild(createSection("Missing data fallbacks", createTextList(preview.missing_data_fallbacks), { badge: `${preview.missing_data_fallbacks.length}`, open: preview.missing_data_fallbacks.length > 0 }));
        root.appendChild(createSection("Preview boundary", createTextList(preview.copyable_handoff_seed.boundary_text), { badge: "read-only" }));
        return root;
      }

      function updateShellState(panel, profile = uiState.profile) {
        uiState.lastPanel = panel || "text";
        uiState.lastUpdated = new Date();
        uiState.profile = profile;
        panelChipEl.textContent = uiState.lastPanel;
        profileChipEl.textContent = `profile: ${uiState.profile}`;
        updatedChipEl.textContent = uiState.lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function renderPanel(data) {
        panelEl.replaceChildren();
        const profile = resolveProfile(data);

        if (!data) {
          panelTitleEl.textContent = "Console Panel";
          panelEl.appendChild(el("div", { className: "status-box", text: "No structured content yet." }));
          updateShellState("idle");
          return;
        }

        if (data.error) {
          panelTitleEl.textContent = "Tool Error";
          panelEl.appendChild(renderError(data.error));
          if (data.error.tool || data.error.mode) {
            panelEl.appendChild(createMetricGrid([
              ["Tool", data.error.tool || "unknown"],
              ["Mode", data.error.mode || "unknown"],
              ["Profile", data.error.profile || profile],
              ["Read-only", String(Boolean(data.error.readOnly))],
            ]));
          }
          updateShellState("error", profile);
          return;
        }

        switch (data.panel) {
          case "casefile":
            panelTitleEl.textContent = "Casefile";
            panelEl.appendChild(renderCasefile(data.casefile));
            updateShellState("casefile", profile);
            return;
          case "working_view":
            panelTitleEl.textContent = "Working View";
            panelEl.appendChild(renderWorkingView(data.workingView));
            updateShellState("working_view", profile);
            return;
          case "strategy":
            panelTitleEl.textContent = "Strategy";
            panelEl.appendChild(renderStrategy(data.strategy, profile, data.presentation));
            updateShellState("strategy", profile);
            return;
          case "boundary":
            panelTitleEl.textContent = "Boundary Packet";
            panelEl.appendChild(renderBoundary(data.packet, profile));
            updateShellState("boundary", profile);
            return;
          case "continuity":
            panelTitleEl.textContent = "Continuity Report";
            panelEl.appendChild(renderContinuity(data.continuity, profile));
            updateShellState("continuity", profile);
            return;
          case "repo":
            panelTitleEl.textContent = "Repo Navigation";
            panelEl.appendChild(renderRepo(data.repo));
            updateShellState("repo", profile);
            return;
          case "audit":
            panelTitleEl.textContent = "Governance Audit";
            panelEl.appendChild(renderAudit(data.audit, profile));
            updateShellState("audit", profile);
            return;
          case "work_contract_card":
            panelTitleEl.textContent = "Work Contract Card";
            panelEl.appendChild(renderWorkContractCard(data));
            updateShellState("work_contract_card", profile);
            return;
          case "project_constellation_preview":
            panelTitleEl.textContent = "Project Constellation Preview";
            panelEl.appendChild(renderProjectConstellationPreview(data));
            updateShellState("project_constellation_preview", profile);
            return;
          default:
            panelTitleEl.textContent = "Structured Output";
            panelEl.appendChild(renderJson(data));
            updateShellState(data.panel || "structured", profile);
        }
      }

      function extractStructured(params) {
        if (params?.structuredContent) {
          return {
            ...params.structuredContent,
            profile: params?._meta?.profile || params.structuredContent.profile || "public",
          };
        }
        const first = params?.content?.[0]?.text;
        if (!first) return null;
        try {
          return {
            ...JSON.parse(first),
            profile: params?._meta?.profile || "public",
          };
        } catch {
          return { text: first, profile: params?._meta?.profile || "public" };
        }
      }

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") return;

          if (message.id && pending.has(message.id)) {
            const req = pending.get(message.id);
            pending.delete(message.id);
            if (message.error) req.reject(message.error);
            else req.resolve(message.result);
            return;
          }

          if (typeof message.method !== "string") return;
          if (message.method === "ui/notifications/tool-result") {
            statusEl.textContent = "Tool output received. Text output remains authoritative if the panel cannot render.";
            renderPanel(extractStructured(message.params));
          }
        },
        { passive: true }
      );

      async function init() {
        try {
          await rpcRequest("ui/initialize", {
            appInfo: { name: "augnes-console-widget", version: "0.1.0" },
            appCapabilities: {},
            protocolVersion: "2026-01-26",
          });
          rpcNotify("ui/notifications/initialized", {});
          statusEl.textContent = "Widget initialized. Run one of the public read-only tools to populate the console.";
        } catch (error) {
          statusEl.textContent = `Failed to initialize widget bridge: ${String(error)}`;
          statusEl.classList.add("error-box");
        }
      }

      init();
    </script>
  </body>
</html>
