<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Augnes</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        background: transparent;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 760px;
      }

      header,
      section {
        border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
        border-radius: 14px;
        background: color-mix(in srgb, Canvas 94%, transparent);
        padding: 14px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1rem;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      p,
      li {
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .eyebrow {
        margin-bottom: 4px;
        color: color-mix(in srgb, CanvasText 62%, transparent);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .muted {
        color: color-mix(in srgb, CanvasText 68%, transparent);
      }

      dl {
        display: grid;
        grid-template-columns: minmax(120px, 0.7fr) minmax(0, 1.3fr);
        gap: 6px 12px;
        margin: 0;
      }

      dt,
      dd {
        margin: 0;
        font-size: 0.8rem;
        line-height: 1.4;
      }

      dt {
        color: color-mix(in srgb, CanvasText 62%, transparent);
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Augnes</p>
        <h1 id="title">Read-only project context</h1>
        <p class="muted" id="summary">
          Waiting for a bounded tool response.
        </p>
      </header>

      <section id="details" hidden>
        <h2>Current view</h2>
        <dl id="facts"></dl>
      </section>

      <section>
        <h2>Boundary</h2>
        <p class="muted">
          This surface is read-only. Native-host execution and structured result
          admission happen inside Augnes through the canonical project-scoped
          lifecycle.
        </p>
      </section>
    </main>

    <script>
      (() => {
        const title = document.getElementById("title");
        const summary = document.getElementById("summary");
        const details = document.getElementById("details");
        const facts = document.getElementById("facts");

        const PROTOCOL_VERSION = "2026-01-26";
        const MAX_PENDING_REQUESTS = 4;
        const MAX_REQUEST_ID = 1024;
        const REQUEST_TIMEOUT_MS = 5000;
        const MAX_PAYLOAD_DEPTH = 6;
        const MAX_PAYLOAD_NODES = 256;
        const MAX_OBJECT_KEYS = 64;
        const MAX_ARRAY_ITEMS = 64;
        const MAX_KEY_LENGTH = 128;
        const MAX_TEXT_LENGTH = 4096;
        const MAX_JSON_TEXT_LENGTH = 16384;
        const pendingRequests = new Map();
        let requestSequence = 0;
        let currentFingerprint = null;

        const isRecord = (value) =>
          value !== null && typeof value === "object" && !Array.isArray(value);
        const record = (value) =>
          isRecord(value) ? value : {};
        const list = (value) => (Array.isArray(value) ? value : []);
        const text = (value, fallback = "Not recorded") =>
          typeof value === "string" && value.trim() ? value.trim() : fallback;
        const owns = (value, key) =>
          Object.prototype.hasOwnProperty.call(value, key);

        function boundValue(
          value,
          depth = 0,
          budget = { remaining: MAX_PAYLOAD_NODES }
        ) {
          if (budget.remaining <= 0) return null;
          budget.remaining -= 1;
          if (value === null || typeof value === "boolean") return value;
          if (typeof value === "number") return Number.isFinite(value) ? value : null;
          if (typeof value === "string") return value.slice(0, MAX_TEXT_LENGTH);
          if (depth >= MAX_PAYLOAD_DEPTH) return null;
          if (Array.isArray(value)) {
            return value
              .slice(0, MAX_ARRAY_ITEMS)
              .map((item) => boundValue(item, depth + 1, budget));
          }
          if (!isRecord(value)) return null;

          const bounded = {};
          for (const [key, item] of Object.entries(value).slice(0, MAX_OBJECT_KEYS)) {
            if (
              key.length > MAX_KEY_LENGTH ||
              key === "__proto__" ||
              key === "constructor" ||
              key === "prototype"
            ) {
              continue;
            }
            bounded[key] = boundValue(item, depth + 1, budget);
          }
          return bounded;
        }

        function boundRecord(value) {
          if (!isRecord(value)) return null;
          const bounded = boundValue(value);
          return isRecord(bounded) && Object.keys(bounded).length > 0
            ? bounded
            : null;
        }

        function canonicalize(value) {
          if (Array.isArray(value)) return value.map(canonicalize);
          if (!isRecord(value)) return value;
          return Object.fromEntries(
            Object.keys(value)
              .sort()
              .map((key) => [key, canonicalize(value[key])])
          );
        }

        function projectionCandidate(payload, publicTextFallback = false) {
          const bounded = boundRecord(payload);
          if (!bounded) return null;
          return {
            payload: bounded,
            fingerprint: JSON.stringify(canonicalize(bounded)),
            publicTextFallback,
          };
        }

        function extractToolResult(params) {
          const result = record(params);
          const structured = projectionCandidate(result.structuredContent);
          if (structured) return structured;

          const first = list(result.content)[0];
          const firstText = isRecord(first) && first.type === "text" ? first.text : null;
          if (
            typeof firstText !== "string" ||
            !firstText.trim() ||
            firstText.length > MAX_JSON_TEXT_LENGTH
          ) {
            return null;
          }

          try {
            return projectionCandidate(JSON.parse(firstText));
          } catch {
            return projectionCandidate(
              { panel: "read_only_text" },
              true
            );
          }
        }

        function setFacts(entries) {
          facts.replaceChildren();
          for (const [label, value] of entries) {
            const term = document.createElement("dt");
            term.textContent = label;
            const description = document.createElement("dd");
            description.textContent = String(value);
            facts.append(term, description);
          }
          details.hidden = entries.length === 0;
        }

        function render(payload) {
          const data = record(payload);
          const panel = text(data.panel, "read_only_context");

          if (panel === "work_picker_card") {
            const picker = record(data.work_picker_card);
            title.textContent = "Choose current work";
            summary.textContent =
              list(data.workItems).length > 0
                ? "Select the active work item in Augnes before starting the native host."
                : "No current work item was returned for this project scope.";
            setFacts([
              ["Candidates", list(data.workItems).length],
              ["Recommendation", text(picker.recommended_work_title)],
              ["Reason", text(picker.selection_reason)],
            ]);
            return;
          }

          if (panel === "work_brief") {
            const brief = record(data.brief);
            const work = record(brief.work);
            title.textContent = text(work.title, "Current work brief");
            summary.textContent =
              "Current metadata and recorded coordination residue are shown without a mutation action.";
            setFacts([
              ["Status", text(work.status)],
              ["Priority", text(work.priority)],
              ["Recent events", list(brief.recent_events).length],
              ["Next action", text(brief.next_action || work.next_action)],
            ]);
            return;
          }

          if (panel === "project_constellation_preview") {
            const preview = record(data.project_constellation_preview);
            const constellation = record(preview.project_constellation);
            title.textContent = "Project Constellation";
            summary.textContent = text(
              constellation.thesis,
              "No project thesis was returned."
            );
            setFacts([
              ["Nodes", list(constellation.nodes).length],
              ["Edges", list(constellation.edges).length],
              ["Tensions", list(preview.unresolved_tensions).length],
              ["Advisory actions", list(preview.next_action_candidates).length],
            ]);
            return;
          }

          title.textContent = "Read-only Augnes result";
          summary.textContent =
            "A bounded tool response is available. Review its narrative in the conversation.";
          setFacts([["View", panel]]);
        }

        function applyProjection(candidate) {
          if (!candidate) return false;
          if (candidate.publicTextFallback && currentFingerprint !== null) {
            return false;
          }
          if (candidate.fingerprint === currentFingerprint) return false;
          render(candidate.payload);
          currentFingerprint = candidate.fingerprint;
          return true;
        }

        function applyGlobals(value) {
          const globals = record(value);
          const toolOutput = projectionCandidate(globals.toolOutput);
          if (toolOutput) return applyProjection(toolOutput);
          return applyProjection(projectionCandidate(globals.structuredContent));
        }

        function nextRequestId() {
          for (let attempt = 0; attempt < MAX_REQUEST_ID; attempt += 1) {
            requestSequence = (requestSequence % MAX_REQUEST_ID) + 1;
            const id = `augnes-ui-${requestSequence}`;
            if (!pendingRequests.has(id)) return id;
          }
          return null;
        }

        function clearPendingRequest(id) {
          const entry = pendingRequests.get(id);
          if (!entry) return null;
          pendingRequests.delete(id);
          window.clearTimeout(entry.timeoutId);
          return entry;
        }

        function rpcRequest(method, params) {
          if (pendingRequests.size >= MAX_PENDING_REQUESTS) {
            return Promise.reject(new Error("Bridge request unavailable."));
          }
          const id = nextRequestId();
          if (!id) return Promise.reject(new Error("Bridge request unavailable."));

          return new Promise((resolve, reject) => {
            const timeoutId = window.setTimeout(() => {
              const entry = clearPendingRequest(id);
              if (entry) entry.reject(new Error("Bridge request timed out."));
            }, REQUEST_TIMEOUT_MS);
            pendingRequests.set(id, { method, resolve, reject, timeoutId });
            try {
              window.parent.postMessage(
                { jsonrpc: "2.0", id, method, params },
                "*"
              );
            } catch {
              clearPendingRequest(id);
              reject(new Error("Bridge request unavailable."));
            }
          });
        }

        function rpcNotify(method) {
          try {
            window.parent.postMessage({ jsonrpc: "2.0", method }, "*");
          } catch {
            // The read-only widget remains usable through window.openai globals.
          }
        }

        function boundedImplementation(value) {
          const implementation = record(value);
          return (
            typeof implementation.name === "string" &&
            implementation.name.length > 0 &&
            implementation.name.length <= MAX_KEY_LENGTH &&
            typeof implementation.version === "string" &&
            implementation.version.length > 0 &&
            implementation.version.length <= MAX_KEY_LENGTH
          );
        }

        function validInitializeResult(value) {
          const result = record(value);
          return (
            result.protocolVersion === PROTOCOL_VERSION &&
            boundedImplementation(result.hostInfo) &&
            isRecord(result.hostCapabilities) &&
            isRecord(result.hostContext)
          );
        }

        function handleResponse(message) {
          if (!owns(message, "id")) return false;
          if (!pendingRequests.has(message.id)) return false;
          const hasResult = owns(message, "result");
          const hasError = owns(message, "error");
          if (owns(message, "method") || hasResult === hasError) {
            const malformedEntry = clearPendingRequest(message.id);
            malformedEntry?.reject(new Error("Bridge response was malformed."));
            return true;
          }

          const entry = clearPendingRequest(message.id);
          if (!entry) return false;
          if (hasError) {
            entry.reject(new Error("Bridge request failed."));
            return true;
          }
          if (
            entry.method === "ui/initialize" &&
            !validInitializeResult(message.result)
          ) {
            entry.reject(new Error("Bridge initialization failed."));
            return true;
          }
          entry.resolve(message.result);
          return true;
        }

        window.addEventListener(
          "message",
          (event) => {
            if (event.source !== window.parent) return;
            const message = event.data;
            if (!isRecord(message) || message.jsonrpc !== "2.0") return;
            if (handleResponse(message)) return;
            if (owns(message, "id") || typeof message.method !== "string") return;
            if (message.method !== "ui/notifications/tool-result") return;
            applyProjection(extractToolResult(message.params));
          },
          { passive: true }
        );

        window.addEventListener("openai:set_globals", (event) => {
          applyGlobals(event.detail?.globals);
        });

        applyGlobals(window.openai);

        async function initializeBridge() {
          try {
            await rpcRequest("ui/initialize", {
              appInfo: { name: "augnes-console-widget", version: "0.1.0" },
              appCapabilities: {},
              protocolVersion: PROTOCOL_VERSION,
            });
            rpcNotify("ui/notifications/initialized");
          } catch {
            // Standard bridge delivery is a fallback peer to window.openai.
          }
        }

        initializeBridge();
      })();
    </script>
  </body>
</html>
