<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Augnes</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        background: transparent;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 760px;
      }

      header,
      section {
        border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
        border-radius: 14px;
        background: color-mix(in srgb, Canvas 94%, transparent);
        padding: 14px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1rem;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      p,
      li {
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .eyebrow {
        margin-bottom: 4px;
        color: color-mix(in srgb, CanvasText 62%, transparent);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .muted {
        color: color-mix(in srgb, CanvasText 68%, transparent);
      }

      dl {
        display: grid;
        grid-template-columns: minmax(120px, 0.7fr) minmax(0, 1.3fr);
        gap: 6px 12px;
        margin: 0;
      }

      dt,
      dd {
        margin: 0;
        font-size: 0.8rem;
        line-height: 1.4;
      }

      dt {
        color: color-mix(in srgb, CanvasText 62%, transparent);
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Augnes</p>
        <h1 id="title">Read-only project context</h1>
        <p class="muted" id="summary">
          Waiting for a bounded tool response.
        </p>
      </header>

      <section id="details" hidden>
        <h2>Current view</h2>
        <dl id="facts"></dl>
      </section>

      <section>
        <h2>Boundary</h2>
        <p class="muted">
          This surface is read-only. Native-host execution and structured result
          admission happen inside Augnes through the canonical project-scoped
          lifecycle.
        </p>
      </section>
    </main>

    <script>
      (() => {
        const title = document.getElementById("title");
        const summary = document.getElementById("summary");
        const details = document.getElementById("details");
        const facts = document.getElementById("facts");

        const record = (value) =>
          value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const list = (value) => (Array.isArray(value) ? value : []);
        const text = (value, fallback = "Not recorded") =>
          typeof value === "string" && value.trim() ? value.trim() : fallback;

        function setFacts(entries) {
          facts.replaceChildren();
          for (const [label, value] of entries) {
            const term = document.createElement("dt");
            term.textContent = label;
            const description = document.createElement("dd");
            description.textContent = String(value);
            facts.append(term, description);
          }
          details.hidden = entries.length === 0;
        }

        function render(payload) {
          const data = record(payload);
          const panel = text(data.panel, "read_only_context");

          if (panel === "work_picker_card") {
            const picker = record(data.work_picker_card);
            title.textContent = "Choose current work";
            summary.textContent =
              list(data.workItems).length > 0
                ? "Select the active work item in Augnes before starting the native host."
                : "No current work item was returned for this project scope.";
            setFacts([
              ["Candidates", list(data.workItems).length],
              ["Recommendation", text(picker.recommended_work_title)],
              ["Reason", text(picker.selection_reason)],
            ]);
            return;
          }

          if (panel === "work_brief") {
            const brief = record(data.brief);
            const work = record(brief.work);
            title.textContent = text(work.title, "Current work brief");
            summary.textContent =
              "Current metadata and recorded coordination residue are shown without a mutation action.";
            setFacts([
              ["Status", text(work.status)],
              ["Priority", text(work.priority)],
              ["Recent events", list(brief.recent_events).length],
              ["Next action", text(brief.next_action || work.next_action)],
            ]);
            return;
          }

          if (panel === "project_constellation_preview") {
            const preview = record(data.project_constellation_preview);
            const constellation = record(preview.project_constellation);
            title.textContent = "Project Constellation";
            summary.textContent = text(
              constellation.thesis,
              "No project thesis was returned."
            );
            setFacts([
              ["Nodes", list(constellation.nodes).length],
              ["Edges", list(constellation.edges).length],
              ["Tensions", list(preview.unresolved_tensions).length],
              ["Advisory actions", list(preview.next_action_candidates).length],
            ]);
            return;
          }

          title.textContent = "Read-only Augnes result";
          summary.textContent =
            "A bounded tool response is available. Review its narrative in the conversation.";
          setFacts([["View", panel]]);
        }

        window.addEventListener("openai:set_globals", (event) => {
          const globals = record(event.detail?.globals);
          render(globals.toolOutput || globals.structuredContent || {});
        });

        render(window.openai?.toolOutput || window.openai?.structuredContent || {});
      })();
    </script>
  </body>
</html>
